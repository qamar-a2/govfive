<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>وزارة الداخلية - GovFive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800;900&family=Tajawal:wght@400;500;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #0a1c14;
      --bg-soft: #0d2117;
      --surface: #13291e;
      --surface-2: #1b3526;
      --border: #28473a;
      --gold: #c8a05c;
      --gold-light: #ddc18b;
      --text: #f2efe6;
      --text-muted: #8fa89b;
      --badge-bg: #1f3d2c;
      --badge-text: #7fcf9c;
      --radius-lg: 18px;
      --radius-md: 14px;
      --radius-sm: 10px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Tajawal', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    button {
      font-family: inherit;
    }

    :focus-visible {
      outline: 2px solid var(--gold-light);
      outline-offset: 2px;
    }

    .page {
      max-width: 960px;
      margin: 0 auto;
      padding-bottom: 60px;
    }

    /* Top bar */
    header.top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
    }

    .icon-btn {
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: transparent;
      color: var(--text-muted);
      border: none;
      cursor: pointer;
      transition: background .15s ease, color .15s ease;
    }

    .icon-btn:hover {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
    }

    header.top-bar h1 {
      font-family: 'Cairo', sans-serif;
      font-size: 17px;
      font-weight: 700;
    }

    /* Hero identity block */
    .hero {
      max-width: 620px;
      margin: 0 auto;
      padding: 6px 24px 28px;
    }

    .entity-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 22px;
      margin-bottom: 26px;
    }

    .entity-text {
      text-align: right;
    }

    .entity-text .ar-name {
      font-family: 'Cairo', sans-serif;
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 5px;
    }

    .entity-text .en-name {
      font-size: 13px;
      color: var(--text-muted);
      letter-spacing: .3px;
    }

    .entity-logo {
      width: 84px;
      height: 84px;
      border-radius: 20px;
      flex-shrink: 0;
      background: radial-gradient(circle at 35% 30%, #1e4230, var(--bg-soft));
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      color: var(--gold-light);
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 14px;
    }

    .stat-card {
      width: 140px;
      background: var(--surface);
      border-radius: var(--radius-md);
      padding: 16px 10px;
      text-align: center;
      border: 1px solid var(--border);
    }

    .stat-card .num {
      font-family: 'Cairo', sans-serif;
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 3px;
    }

    .stat-card .label {
      font-size: 13px;
      color: var(--text-muted);
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 26px;
      padding: 22px 24px 0;
      border-bottom: 1px solid var(--border);
    }

    .tab {
      background: none;
      border: none;
      padding: 0 2px 14px;
      font-size: 15px;
      font-weight: 700;
      color: var(--text-muted);
      cursor: pointer;
      position: relative;
    }

    .tab.active {
      color: var(--gold-light);
    }

    .tab.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      right: 0;
      left: 0;
      height: 3px;
      background: var(--gold-light);
      border-radius: 3px 3px 0 0;
    }

    .content {
      padding: 22px 24px 0;
    }

    .hidden {
      display: none;
    }

    /* Grids — collapse to one column on small screens, two on wider ones */
    .services-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
    }

    .branch-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    @media (min-width: 680px) {
      .services-grid {
        grid-template-columns: 1fr 1fr;
      }

      .branch-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    /* Service card */
    .service-card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: 20px;
      border: 1px solid var(--border);
    }

    .service-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
    }

    .badge {
      background: var(--badge-bg);
      color: var(--badge-text);
      font-size: 12px;
      font-weight: 700;
      padding: 7px 12px;
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .service-icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: var(--surface-2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--gold-light);
      flex-shrink: 0;
    }

    .service-title {
      font-family: 'Cairo', sans-serif;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .service-desc {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .requirements {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      margin-bottom: 18px;
    }

    .requirements .req-title {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 7px;
      color: var(--gold-light);
    }

    .requirements .req-text {
      font-size: 13px;
      color: var(--text-muted);
    }

    .service-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .price-block .label {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 2px;
    }

    .price-block .price {
      font-family: 'Cairo', sans-serif;
      font-size: 17px;
      font-weight: 800;
    }

    .start-btn {
      background: var(--gold);
      color: #1c1407;
      font-weight: 700;
      font-size: 14px;
      padding: 11px 26px;
      border-radius: var(--radius-sm);
      border: none;
      cursor: pointer;
      transition: background .15s ease;
    }

    .start-btn:hover {
      background: var(--gold-light);
    }

    /* Branches */
    .city-section {
      margin-bottom: 26px;
    }

    .city-header {
      display: flex;
      align-items: center;
      gap: 9px;
      font-family: 'Cairo', sans-serif;
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 14px;
      color: var(--gold-light);
    }

    .branch-card {
      background: var(--surface);
      border-radius: var(--radius-md);
      padding: 18px;
      border: 1px solid var(--border);
    }

    .branch-top {
      margin-bottom: 6px;
    }

    .city-tag {
      background: var(--badge-bg);
      color: var(--badge-text);
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 8px;
      font-weight: 700;
      display: inline-block;
      margin-bottom: 8px;
    }

    .branch-name {
      font-size: 15px;
      font-weight: 700;
      display: block;
    }

    .branch-address {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .branch-actions {
      display: flex;
      gap: 10px;
    }

    .branch-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px;
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s ease;
    }

    .branch-btn:hover {
      background: var(--border);
    }

    .branch-phone {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      text-align: right;
    }

    .phone-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .phone-number {
      font-size: 15px;
      font-weight: 700;
    }

    @media (max-width: 420px) {
      .entity-text .ar-name {
        font-size: 19px;
      }

      .entity-logo {
        width: 72px;
        height: 72px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <header class="top-bar">
      <button class="icon-btn" aria-label="إغلاق">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
          stroke-linecap="round">
          <line x1="5" y1="5" x2="19" y2="19" />
          <line x1="19" y1="5" x2="5" y2="19" />
        </svg>
      </button>
    </header>

    <div class="hero">
      <div class="entity-row">
        <div class="entity-text">
          <div class="ar-name">وزارة الداخلية</div>
          <div class="en-name">Ministry of Interior</div>
        </div>
        <div class="entity-logo">
          <svg width="38" height="38" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M24 5 L41 11 V24 C41 34 33 41 24 43 C15 41 7 34 7 24 V11 Z" />
            <path d="M24 15 V31 M17 23 H31" stroke-width="1.6" />
          </svg>
        </div>
      </div>
      <div class="stats">
        <div class="stat-card">
          <div class="num">4</div>
          <div class="label">الأفرع</div>
        </div>
        <div class="stat-card">
          <div class="num">2</div>
          <div class="label">الخدمات</div>
        </div>
      </div>
    </div>

    <nav class="tabs" role="tablist">
      <button class="tab active" id="tab-services" role="tab" aria-selected="true"
        onclick="showTab('services')">الخدمات</button>
      <button class="tab" id="tab-branches" role="tab" aria-selected="false"
        onclick="showTab('branches')">الأفرع</button>
    </nav>
    <div class="content">
      <section id="services-content" class="services-grid" style="display: none;">
      </section>

      <section id="branches-content" class="branches-grid" style="display: none;">
      </section>


    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const ministryId = params.get("id");
    const token = localStorage.getItem("userToken");
    const BASE = "http://egovservices.runasp.net";

    async function loadMinistryData() {
      if (!ministryId) return;

      try {
        // 1.ربط  تفاصيل الوزارة
        const res = await fetch(`${BASE}/api/Ministries/${ministryId}`, {
          headers: { "Authorization": `Bearer ${token}` }
        });
        const result = await res.json();
        const m = result.data || result;

        document.querySelector(".ar-name").textContent = m.name || "";
        document.querySelector(".en-name").textContent = m.description || "";

        // ربط الصورة 
        const logoDiv = document.querySelector(".entity-logo");
        if (m.logoUrl) {
          logoDiv.innerHTML = `<img src="${BASE}${m.logoUrl}" style="width:38px;height:38px;object-fit:contain;">`;
        }

        // 2.  ربط الخدمات
        const sRes = await fetch(`${BASE}/api/Ministries/${ministryId}/services`, {
          headers: { "Authorization": `Bearer ${token}` }
        });
        const sResult = await sRes.json();
        const services = sResult.data || sResult;

        // عدد الخدمات بالـ stat card ربط 
        const nums = document.querySelectorAll(".num");
        if (nums[1]) nums[1].textContent = services.length || 0;

        // محتوى الخدمات 
        const servicesContent = document.getElementById("services-content");
        if (servicesContent) {
          servicesContent.innerHTML = "";
          services.forEach(s => {
            servicesContent.innerHTML += `
  <div class="service-card">
    <div class="service-top">
      <span class="badge">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="18" x="3" y="3" rx="2"/></svg>
        ${s.serviceTypeLabel || ""}
      </span>
      <div class="service-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect width="18" height="18" x="3" y="3" rx="2"/></svg>
      </div>
    </div>
    <h3 class="service-title">${s.name}</h3>
    <p class="service-desc">${s.description || ""}</p>
    <div class="service-footer">
      <div class="price-block">
        <div class="label">الرسوم</div>
        <div class="price">${s.serviceFee} ل.س</div>
      </div>
    <button class="start-btn" onclick="window.location.href='service.html?id=${s.id}'">
  بدء الخدمة
</button>
    </div>
    </div>`;
          });
          // 3. ---------الفروع-------/
          const bRes = await fetch(`${BASE}/api/Ministries/${ministryId}/branches`, {
            headers: { "Authorization": `Bearer ${token}` }
          });
          const bResult = await bRes.json();
          const branches = bResult.data || bResult;

          // عدد الفروع بالـ stat card
          if (nums[0]) nums[0].textContent = branches.length || 0;

          // محتوى الفروع
          const branchesContent = document.getElementById("branches-content");
          if (branchesContent) {
            branchesContent.innerHTML = "";

            // تجميع الفروع حسب المدينة
            const cities = {};
            branches.forEach(b => {
              const city = b.city || "أخرى";
              if (!cities[city]) cities[city] = [];
              cities[city].push(b);
            });

            Object.keys(cities).forEach(city => {
              branchesContent.innerHTML += `
      <div class="city-section">
        <div class="city-header">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="4" y="9" width="6" height="12"/><rect x="14" y="4" width="6" height="17"/>
          </svg>
          ${city}
        </div>
        <div class="branch-grid">
          ${cities[city].map(b => `
          <div class="branch-card">
            <div class="branch-top">
              <span class="city-tag">${city}</span>
              <span class="branch-name">${b.name}</span>
            </div>
            <div class="branch-address">${b.address || ""}</div>
            <div class="branch-phone">
              <div class="phone-label">📞 رقم الاتصال</div>
              <div class="phone-number">${b.phone || b.phoneNumber || "---"}</div>
            </div>
          </div>`).join("")}
        </div>
      </div>`;
            });
          }
          // --------------------------------------------------------
        }


      } catch (err) {
        console.error(err);
      }
    }

    function showTab(tab) {
      const isServices = tab === 'services';
      document.getElementById('tab-services').classList.toggle('active', isServices);
      document.getElementById('tab-branches').classList.toggle('active', !isServices);
      document.getElementById('tab-services').setAttribute('aria-selected', isServices);
      document.getElementById('tab-branches').setAttribute('aria-selected', !isServices);
      document.getElementById('services-content').style.display = isServices ? 'grid' : 'none';
      document.getElementById('branches-content').style.display = isServices ? 'none' : 'block';
    }

    loadMinistryData();
  </script>
</body>

</html>
