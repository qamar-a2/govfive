<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>البروفايل</title>

  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap"
    rel="stylesheet" />

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {

  /* اللون الأساسي والرئيسي */
  --green-darkest: #042522;

  /* ألوان مساعدة */
  --green-dark: #0a342d;
  --green-mid: #1f5a50;

  /* الخلفية البيج */
  --bg-beige: #f8f3ea;
  --bg-beige-2: #f2eadc;

  --white: #ffffff;

  /* النصوص */
  --text-dark: #042522;
  --text-mid: #36524d;
  --text-light: #6e8782;

  /* الحدود */
  --border: #d5dfdc;

  /* الأخضر الفاتح */
  --soft-green: #e2ebe8;
}

    body {
      font-family: 'Qomra', sans-serif;

      background:
        linear-gradient(to bottom,
          var(--bg-beige),
          var(--bg-beige-2));

      min-height: 100vh;

      color: var(--text-dark);
    }

    /* ───────── HEADER ───────── */

    header {
      height: 76px;

      background: rgba(255, 255, 255, 0.88);

      backdrop-filter: blur(14px);

      border-bottom: 1px solid rgba(255, 255, 255, 0.7);

      box-shadow: 0 2px 18px rgba(4, 37, 34, 0.05);

      display: flex;
      align-items: center;
      justify-content: space-between;

      padding: 0 48px;

      position: sticky;
      top: 0;

      z-index: 50;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;

      font-size: 24px;
      font-weight: 900;

      color: #96835F;
    }

    .logo-img img{
      width: 50px;
      padding-top: 12px;
    } 
   


    nav {
      display: flex;
      gap: 34px;
    }

    nav a {
      text-decoration: none;

      font-size: 15px;
      font-weight: 700;

      color: var(--green-darkest);

      padding-bottom: 5px;

      transition: .25s;
    }

    nav a:hover {
      color: #96835F;
    }

    nav a.active {
      color: var(--green-dark);

      border-bottom: 2px solid var(--green-mid);
    }

    /* ───────── LAYOUT ───────── */

    .container {
      max-width: 1150px;

      margin: 0 auto;

      padding: 48px 32px 80px;

      display: grid;

      grid-template-columns: 290px 1fr;

      gap: 32px;

      align-items: start;
    }

    /* ───────── SIDEBAR ───────── */

    .sidebar {

      background: rgba(255, 255, 255, 0.84);

      border: 1px solid rgba(255, 255, 255, 0.7);

      border-radius: 30px;

      overflow: hidden;

      backdrop-filter: blur(14px);

      box-shadow: 0 12px 30px rgba(4, 37, 34, 0.08);

      animation: fadeUp .4s ease both;
    }

    .sidebar-top {

      background:
        linear-gradient(135deg,
          var(--green-darkest) 0%,
          var(--green-dark) 45%,
          var(--green-mid) 100%);

      padding: 38px 24px 30px;

      text-align: center;

      position: relative;
    }

    .sidebar-top::before {
      content: "";

      position: absolute;
      inset: 0;

      background:
        radial-gradient(circle at top left,
          rgba(255, 255, 255, 0.18),
          transparent 40%);
    }

    .avatar {
      width: 88px;
      height: 88px;

      border-radius: 50%;

      margin: 0 auto 14px;

      display: flex;
      align-items: center;
      justify-content: center;

      background: rgba(255, 255, 255, 0.12);

      border: 3px solid rgba(255, 255, 255, 0.35);

      backdrop-filter: blur(8px);
    }

    .avatar svg {
      width: 42px;
      height: 42px;

      color: white;
    }

    .sidebar-name {
      font-size: 22px;
      font-weight: 900;

      color: white;

      margin-bottom: 5px;
    }

    .sidebar-sub {
      font-size: 13px;

      color: rgba(255, 255, 255, 0.72);
    }

    .sidebar-nav {
      padding: 16px 0;
    }

    .sidebar-link {
      display: flex;
      align-items: center;
      gap: 12px;

      padding: 15px 24px;

      font-size: 14px;
      font-weight: 700;

      color: var(--green-darkest);

      border-right: 3px solid transparent;

      transition: .25s;

      cursor: pointer;
    }

    .sidebar-link svg {
      width: 18px;
      height: 18px;
    }

    .sidebar-link:hover {
      background: var(--soft-green);

      color: var(--dar);
    }

    .sidebar-link.active {
      background: var(--soft-green);

      color: var(--green-dark);

      border-right-color: var(--green-mid);
    }

    /* ───────── CONTENT ───────── */

    .content {
      display: flex;
      flex-direction: column;

      gap: 24px;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .section-title {
      font-size: 30px;
      font-weight: 900;

      color: var(--green-darkest);
    }

    .info-grid {
      display: grid;

      grid-template-columns: 1fr 1fr;

      gap: 18px;
    }

    .info-card,
    .phone-card {

      background: rgba(255, 255, 255, 0.84);

      border: 1px solid rgba(255, 255, 255, 0.7);

      border-radius: 26px;

      padding: 22px;

      display: flex;
      align-items: center;
      gap: 16px;

      backdrop-filter: blur(14px);

      box-shadow: 0 10px 26px rgba(4, 37, 34, 0.06);

      transition: .25s;

      animation: fadeUp .4s ease both;
    }

    .info-card:hover,
    .phone-card:hover {
      transform: translateY(-4px);

      box-shadow: 0 16px 38px rgba(12, 65, 55, 0.14);
    }

    .info-card.full {
      grid-column: 1 / -1;
    }

    .ic-icon {
      width: 54px;
      height: 54px;

      flex-shrink: 0;

      border-radius: 18px;

      display: flex;
      align-items: center;
      justify-content: center;

      background:
        linear-gradient(135deg,
          #edf5f2,
          #dce9e5);

      border: 1px solid var(--border);
    }

    .ic-icon svg {
      width: 22px;
      height: 22px;

      color: var(--green-darkest);
    }

    .ic-body {
      flex: 1;

      text-align: right;
    }

    .ic-label {
      font-size: 12px;
      font-weight: 700;

      color: var(--text-light);

      margin-bottom: 6px;
    }

    .ic-value {
      font-size: 17px;
      font-weight: 800;

      color: var(--green-darkest);

      direction: ltr;

      text-align: right;
    }

    .ic-value.arabic {
      direction: rtl;
    }

    /* ───────── BUTTON ───────── */

    .edit-btn {
      width: 42px;
      height: 42px;

      border: none;

      border-radius: 14px;

      display: flex;
      align-items: center;
      justify-content: center;

      cursor: pointer;

      color: white;

      background:
        linear-gradient(135deg,
          var(--green-dark),
          var(--green-mid));

      box-shadow: 0 10px 22px rgba(12, 65, 55, 0.22);

      transition: .2s;
    }

    .edit-btn:hover {
      transform: scale(1.06);
    }

    .edit-btn svg {
      width: 15px;
      height: 15px;
    }

    /* ───────── MODAL ───────── */

    .overlay {
      display: none;

      position: fixed;
      inset: 0;

      background: rgba(4, 37, 34, 0.45);

      backdrop-filter: blur(6px);

      z-index: 200;

      align-items: center;
      justify-content: center;
    }

    .overlay.show {
      display: flex;
    }

    .modal {

      width: 460px;
      max-width: 92vw;

      background: rgba(255, 255, 255, 0.92);

      border-radius: 28px;

      padding: 36px 32px 28px;

      backdrop-filter: blur(16px);

      box-shadow: 0 28px 70px rgba(0, 0, 0, 0.18);

      animation: popIn .25s ease;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;

      margin-bottom: 24px;
    }

    .modal-title {
      font-size: 21px;
      font-weight: 900;

      color: var(--green-darkest);

      display: flex;
      align-items: center;
      gap: 10px;
    }

    .modal-title svg {
      width: 20px;
      height: 20px;

      color: var(--green-mid);
    }

    .modal-close {
      width: 36px;
      height: 36px;

      border: none;

      border-radius: 12px;

      background: var(--soft-green);

      cursor: pointer;

      transition: .2s;
    }

    .modal-close:hover {
      background: #dce9e5;
    }

    .modal-label {
      font-size: 13px;
      font-weight: 700;

      color: var(--text-light);

      margin-bottom: 8px;
    }

    .modal-input {
      width: 100%;

      padding: 14px 18px;

      border-radius: 16px;

      border: 1.5px solid var(--border);

      background: #f8fbfa;

      font-family: 'Tajawal', sans-serif;
      font-size: 16px;

      outline: none;

      margin-bottom: 24px;

      transition: .2s;
    }

    .modal-input:focus {
      border-color: var(--green-mid);

      box-shadow: 0 0 0 4px rgba(67, 123, 115, 0.14);
    }

    .modal-btns {
      display: flex;

      gap: 12px;
    }

    .btn-cancel,
    .btn-save {
      flex: 1;

      padding: 14px;

      border-radius: 15px;

      font-family: 'Tajawal', sans-serif;

      font-size: 15px;
      font-weight: 800;

      cursor: pointer;

      transition: .2s;
    }

    .btn-cancel {
      background: var(--soft-green);

      border: 1px solid var(--border);

      color: var(--green-darkest);
    }

    .btn-save {
      border: none;

      color: white;

      background:
        linear-gradient(135deg,
          var(--green-dark),
          var(--green-mid));

      box-shadow: 0 10px 24px rgba(12, 65, 55, 0.2);
    }

    .btn-save:hover {
      opacity: .92;
    }

    /* ───────── ANIMATION ───────── */

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(.92);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* ───────── RESPONSIVE ───────── */

    @media (max-width: 768px) {

      .container {
        grid-template-columns: 1fr;

        padding: 24px 16px;
      }

      .info-grid {
        grid-template-columns: 1fr;
      }

      header {
        padding: 0 20px;
      }

      nav {
        gap: 18px;
      }

      .section-title {
        font-size: 24px;
      }
    }
    /* ───────── FONTS ───────── */
    @font-face {
            font-family: 'Qomra';
            src: url('./fonts/itfQomraArabic-Regular.woff2') format('woff2'),
                 url('./fonts/itfQomraArabic-Regular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        /* 2. تعريف الخط العريض */
        @font-face {
            font-family: 'Qomra';
            src: url('./fonts/itfQomraArabic-Bold.woff2') format('woff2'),
                 url('./fonts/itfQomraArabic-Bold.ttf') format('truetype');
            font-weight: bold;
            font-style: normal;
        }
  </style>
</head>

  <script>

  
    // ----------------------------الربط-----------------------//
    let nationalNumber = document.getElementById("nationalNumber")
    let siderName = document.getElementById("siderName")
    let siderEmail = document.getElementById("siderEmail")
    let useremail = document.getElementById("user-email")
    let nameUser = document.getElementById("nameUser")
   let lastName = document.getElementById("lastName")
    let fatherName = document.getElementById("fatherName")
   let motherName = document.getElementById("motherName")
   let dateUser = document.getElementById("dateUser")
   let phoneDisplay = document.getElementById("phoneDisplay")
   
   const token=localStorage.getItem("userToken")

   if(!token){
    window.location.href="index.html"
   }

   async function getdata() {
    try{
      const response= await fetch("http://egovservices.runasp.net/api/Auth/me",{
          method : "GET",
          headers :{
             "Authorization" : `Bearer ${token}` ,
            "content-type" : "application/json"
          },
        
          
      })
      if(response.ok){
        const data=await response.json()
        console.log("بيانات السيرفر", data);
        siderName.textContent=`${data.data.firstName} ${data.data.lastName}`
        siderEmail.textContent=data.data.email

        nationalNumber.textContent=data.data.nationalNumber
        useremail.textContent=data.data.email
        nameUser.textContent=data.data.firstName
        lastName.textContent=data.data.lastName
        fatherName.textContent=data.data.fatherName
        motherName.textContent=data.data.motherName
         dateUser.textContent=data.data.birthDate
         phoneDisplay.textContent=data.data.phoneNumber   
      }
    else {
          console.log("السيرفر رفض الطلب، الرمز:", response.status);
        }
    }catch (error) {
        console.error("Error updating phone:", error);
        alert("حدث خطأ في الاتصال بالسيرفر");
    }
    
   }
   getdata()

  //  *****************************ربط تعديل الرقم ***************************//
    function openModal() {
      document.getElementById('overlay').classList.add('show');

      setTimeout(() => {
        document.getElementById('newPhone').focus();
      }, 100);
    }

    function closeModal() {
      document.getElementById('overlay').classList.remove('show');

      document.getElementById('newPhone').value = '';
    }

    function closeOnOverlay(e) {
      if (e.target === document.getElementById('overlay')) {
        closeModal();
      }
    }


  async function savePhone(){
    const val=document.getElementById("newPhone").value.trim()

    const token=localStorage.getItem("userToken")

   if (!val || val.length < 7) {

        const inp =
          document.getElementById('newPhone');

        inp.style.borderColor = '#d95b5b';

        inp.style.boxShadow =
          '0 0 0 4px rgba(217,91,91,0.15)';

        setTimeout(() => {

          inp.style.borderColor = '';

          inp.style.boxShadow = '';

        }, 1400);

        return;
      }
      try{
        const response=await fetch("http://egovservices.runasp.net/api/Auth/profile/phone",
        {
          method : "PATCH",
          headers : {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body : JSON.stringify(
            {
               newPhone: val    
            })
               
        })
        if(response.ok){
          document.getElementById("phoneDisplay").textContent=val
          closeModal();
          alert("تم حفظ الرقم بنجاح ")
        }
      else {
          const errorData = await response.json().catch(() => ({}));
          alert(`فشل التعديل: ${errorData.message || "الرقم غير صالح"}`);
        }
      }
      catch(error){
        console.error("خطأ في الاتصال بالسيرفر:", error);
        alert("حدث خطأ في الشبكة، يرجى المحاولة لاحقاً");
      }
  }









  </script>
