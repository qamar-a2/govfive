<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معاملاتي - بوابة الخدمات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
         @font-face {
            font-family: 'Qomra';
            src: url('./fonts/itfQomraArabic-Regular.woff2') format('woff2'),
                 url('./fonts/itfQomraArabic-Regular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        /* 2. تعريف الخط العريض */
        @font-face {
            font-family: 'Qomra';
            src: url('./fonts/itfQomraArabic-Bold.woff2') format('woff2'),
                 url('./fonts/itfQomraArabic-Bold.ttf') format('truetype');
            font-weight: bold;
            font-style: normal;
        }
        body { font-family: 'Qomra', sans-serif; background-color: #EFEBE3; }
    </style>
</head>
<body class="pb-10">
     
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold text-gray-800">قائمة معاملاتي</h1>
            <button class="text-[#042522] hover:bg-[#96835F]/10 p-2 rounded-full transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                </svg>
            </button>
        </div>
    </header>

    <div class="max-w-4xl mx-auto px-4 mt-6">
        <div class="flex bg-white/50 p-1 rounded-2xl gap-2 backdrop-blur-sm">
            <button class="flex-1 py-3 px-4 rounded-xl font-bold text-white bg-[#042522] shadow-md transition-all">
                قيد التنفيذ (5)
            </button>
            <button class="flex-1 py-3 px-4 rounded-xl font-medium text-gray-500 hover:bg-white hover:text-[#96835F] transition-all">
                المكتملة
            </button>
            <button class="flex-1 py-3 px-4 rounded-xl font-medium text-gray-500 hover:bg-white hover:text-[#96835F] transition-all">
                الملغاة
            </button>
        </div>
    </div>

    <main class="max-w-4xl mx-auto px-4 mt-8 space-y-4">
        
        <div class="bg-white rounded-3xl p-6 shadow-sm border border-gray-100 flex items-center justify-between group hover:shadow-md transition-all duration-300">
            <div class="flex items-center space-x-reverse space-x-5">
                <div class="bg-[#96835F]/10 p-4 rounded-2xl group-hover:bg-[#042522] group-hover:text-white transition">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                </div>
                <div>
                    <h3 class="font-bold text-lg text-gray-800">تصديق شهادة جامعية</h3>
                    <p class="text-sm text-gray-500 mt-1">وزارة التعليم العالي والبحث العلمي</p>
                    <div class="flex items-center mt-3 text-xs text-gray-400">
                        <svg class="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        12 تشرين الأول 2023
                    </div>
                </div>
            </div>
            
            <div class="flex flex-col items-end gap-3">
                <span class="bg-[#96835F]/20 text-[#8B7D54] px-4 py-1.5 rounded-full text-xs font-bold border border-[#96835F]/30">
                    بانتظار الموافقة
                </span>
                <button class="text-gray-400 hover:text-[#96835F] transition">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </button>
            </div>
        </div>
        <div class="bg-white rounded-3xl p-6 shadow-sm border border-gray-100 flex items-center justify-between group">
            <div class="flex items-center space-x-reverse space-x-5">
                <div class="bg-[#96835F]/10 p-4 rounded-2xl group-hover:bg-[#042522] group-hover:text-white transition">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>
                </div>
                <div>
                    <h3 class="font-bold text-lg text-gray-800">تجديد جواز سفر</h3>
                    <p class="text-sm text-gray-500 mt-1">وزارة الداخلية - الهجرة والجوازات</p>
                    <div class="flex items-center mt-3 text-xs text-gray-400">
                        <svg class="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        05 تشرين الأول 2023
                    </div>
                </div>
            </div>
            <div class="flex flex-col items-end gap-3">
                <span class="bg-[#6A1D2A] text-[#ECE6DB] px-4 py-1.5 rounded-full text-xs font-bold border border-[#ECE6DB]">
                    قيد التدقيق
                </span>
                <button class="text-gray-400 hover:text-[#96835F] transition">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </button>
            </div>
        </div>

    </main>

    <div class="md:hidden fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] bg-white/90 backdrop-blur-lg shadow-2xl rounded-3xl p-3 flex justify-around items-center border border-gray-100">
        <button class="p-3 text-gray-400"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg></button>
        <button class="bg-[#2D4A3E] text-white px-6 py-2 rounded-2xl flex items-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
            <span>معاملاتي</span>
        
        </button>
        <button class="p-3 text-gray-400"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg></button>
    </div>
    <a href="choise.html"></a>
</body>
</html>
