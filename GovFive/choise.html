<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الخدمات الرقمية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- <script src="HTTPS://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.00/css/all.main.css">
     -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #EFEBE3; }
        .hero-gradient { background: #B5A374; }
    </style>
</head>
<body class="text-gray-800">
       
    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 shadow-sm">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="text-2xl font-bold text-[#B5A374]">خدمات سورية</div>
            <div class="hidden md:flex space-x-reverse space-x-8">
                <a href="#" class="text-[#B5A374] border-b-2 border-[#B5A374] pb-1">الرئيسية</a>
                <a href="treatment.html" class="hover:text-[#B5A374] transition" >المعاملات</a>
                <a href="prof.html" class="hover:text-[#B5A374] transition">الملف الشخصي</a>
            </div>
            <button class="bg-[#B5A374] text-white px-5 py-2 rounded-full hover:bg-opacity-90 transition">دخول</button>
        </div>
    </nav>

    <header class="max-w-6xl mx-auto px-4 mt-8">
        <div class="hero-gradient rounded-3xl p-8 md:p-12 text-white shadow-lg flex flex-col md:flex-row justify-between items-center">
            <div class="max-w-lg text-center md:text-right">
                <h1 class="text-3xl md:text-4xl font-bold mb-4">خدمات جديدة</h1>
                <p class="text-lg opacity-90 leading-relaxed">
                    وفر وقتك وأنجز معاملاتك بضغطة زر. استفد من أحدث الخدمات الرقمية السورية المطورة لتسهيل حياتك اليومية.
                </p>
            </div>
            <div class="hidden md:block">
                <svg width="150" height="150" fill="currentColor" class="opacity-20" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
            </div>
        </div>
    </header>

    <section class="max-w-4xl mx-auto px-4 -mt-8">
        <div class="bg-white rounded-2xl shadow-xl p-2 flex items-center border border-gray-100">
            <input type="text" placeholder="ابحث عن معاملة (مثلاً: استخراج قيد مدني)..." 
                   class="w-full px-6 py-4 rounded-xl outline-none text-lg">
            <button class="bg-[#B5A374] p-4 rounded-xl text-white hover:scale-105 transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            </button>
        </div>
    </section>

    <main class="max-w-6xl mx-auto px-4 py-16">
        <div class="flex justify-between items-end mb-10">
            <h2 class="text-2xl font-bold border-r-4 border-[#B5A374] pr-4">الجهات الحكومية:</h2>
            <a href="#" class="text-[#B5A374] font-medium hover:underline">عرض الكل</a>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
            <div class="group bg-white p-8 rounded-3xl shadow-sm hover:shadow-xl transition-all duration-300 text-center cursor-pointer border border-transparent hover:border-[#B5A374]">
                <div class="bg-[#f8f6f2] w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6 group-hover:bg-[#B5A374] group-hover:text-white transition">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                </div>
                <h3 class="font-bold text-lg group-hover:text-[#B5A374]">وزارة الخارجية</h3>
            </div>

            <div class="group bg-white p-8 rounded-3xl shadow-sm hover:shadow-xl transition-all duration-300 text-center cursor-pointer border border-transparent hover:border-[#B5A374]">
                <div class="bg-[#f8f6f2] w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6 group-hover:bg-[#B5A374] group-hover:text-white transition">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                </div>
                <h3 class="font-bold text-lg group-hover:text-[#B5A374]">وزارة الداخلية</h3>
            </div>

            <div class="group bg-white p-8 rounded-3xl shadow-sm hover:shadow-xl transition-all duration-300 text-center cursor-pointer border border-transparent hover:border-[#B5A374]">
                <div class="bg-[#f8f6f2] w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6 group-hover:bg-[#B5A374] group-hover:text-white transition">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                </div>
                <h3 class="font-bold text-lg group-hover:text-[#B5A374]">وزارة الصحة</h3>
            </div>

            <div class="group bg-white p-8 rounded-3xl shadow-sm hover:shadow-xl transition-all duration-300 text-center cursor-pointer border border-transparent hover:border-[#B5A374]">
                <div class="bg-[#f8f6f2] w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6 group-hover:bg-[#B5A374] group-hover:text-white transition">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
                </div>
                <h3 class="font-bold text-lg group-hover:text-[#B5A374]">الخدمات التقنية</h3>
            </div>
        </div>
    </main>

    <footer class="bg-white py-8 mt-12 border-t border-gray-200">
        <div class="max-w-6xl mx-auto px-4 text-center text-gray-500 text-sm">
            &copy; 2026 جميع الحقوق محفوظة - تطوير قمر المهندسة
        </div>
    </footer>
   
</body>
</html>
