<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد الحساب | Verification</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #fdfcf9; }
        .otp-input:focus { border-color: #c2a379; box-shadow: 0 0 0 2px rgba(194, 163, 121, 0.2); outline: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full bg-white p-8 rounded-3xl shadow-xl shadow-gray-200/50 text-center border border-gray-100">
         
        <div class="mb-8 flex justify-center">
            <div class="w-24 h-24 bg-[#f4f1ea] rounded-3xl flex items-center justify-center relative">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-[#8b7355]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                </svg>
                <div class="absolute bottom-4 right-4 bg-[#8b7355] rounded-full p-1 border-4 border-white">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
                    </svg>
                </div>
            </div>
        </div>

        <h1 class="text-2xl font-bold text-gray-800 mb-3">أدخل رمز التحقق</h1>
        <p class="text-gray-500 text-sm mb-1 leading-relaxed">لقد أرسلنا رمز تأكيد مكون من 6 أرقام إلى بريدك الإلكتروني</p>
        <p class="text-[#8b7355] font-semibold mb-8 tracking-wide">qamar@gmail.com</p>

        <div class="flex justify-between gap-2 mb-10" dir="ltr">
            <input type="text" maxlength="1" class="otp-input w-12 h-14 text-center text-xl font-bold border-2 border-gray-100 rounded-xl bg-gray-50 transition-all">
            <input type="text" maxlength="1" class="otp-input w-12 h-14 text-center text-xl font-bold border-2 border-gray-100 rounded-xl bg-gray-50 transition-all">
            <input type="text" maxlength="1" class="otp-input w-12 h-14 text-center text-xl font-bold border-2 border-gray-100 rounded-xl bg-gray-50 transition-all">
            <input type="text" maxlength="1" class="otp-input w-12 h-14 text-center text-xl font-bold border-2 border-gray-100 rounded-xl bg-gray-50 transition-all">
            <input type="text" maxlength="1" class="otp-input w-12 h-14 text-center text-xl font-bold border-2 border-gray-100 rounded-xl bg-gray-50 transition-all">
            <input type="text" maxlength="1" class="otp-input w-12 h-14 text-center text-xl font-bold border-2 border-gray-100 rounded-xl bg-gray-50 transition-all">
        </div>

        <button class="w-full bg-[#c2a379] hover:bg-[#b08e5f] text-white font-bold py-4 rounded-2xl transition-all duration-300 shadow-lg shadow-[#c2a379]/30 active:scale-[0.98]">
            تأكيد الرمز
        </button>

        <div class="mt-8">
            <p class="text-gray-400 text-sm mb-1">لم يصلك الرمز؟</p>
            <button class="text-[#8b7355] font-bold text-sm hover:underline">
                إعادة إرسال الرمز <span class="text-gray-400 font-normal mr-1">(00:59)</span>
            </button>
        </div>

    </div>

    <script>
        const inputs = document.querySelectorAll('.otp-input');
-        inputs.forEach((input, index) => {
            input.addEventListener('input', () => {if (input.value && index < inputs.length - 1) inputs[index + 1].focus();
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !input.value && index > 0) inputs[index - 1].focus();
            });
        });
    </script>
</body>
</html>
