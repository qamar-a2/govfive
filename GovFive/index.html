<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب جديد</title>
    <link rel="stylesheet" href="./log.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

     <div class="icon1 parent-icon-up icon">
            <img src="/GovFive/image/icons/5.svg" alt="">
        </div>
     <div class="icon2 parent-icon-down icon">
            <img src="/GovFive/image/icons/7.svg" alt="">
        </div>
     <div class="icon3 parent-icon-float icon">
            <img src="/GovFive/image/icons/8.svg" alt="">
        </div>
           <div class="icon4 parent-icon-Wave icon">
            <img src="/GovFive/image/icons/2.svg" alt="">
        </div>
        <!-- -------------------------- -->
         <div class="point point1 parent-icon-float"></div>
         <div class="point point2"></div>
         <div class="point point3 parent-icon-scale"></div>
         <div class="point point4 "></div>
         <div class="point point5 parent-icon-Wave2"></div>
         <div class="point point6 parent-icon-float"></div>

    
    <div class="registration-container">
        <div class="header-nav">
           
        </div>

        <div class="logo-section">
            <div class="user-icon-wrapper">
                <i class="fas fa-user-plus"></i>
            </div>
            <h1>انشاء حساب</h1>
            <a href="log.html"></a> 
            <p>أهلاً بك! ابدأ الآن واجعل إنجاز معاملاتك أسهل من أي وقت.</p>
        </div>

        <form class="signup-form">
            <div class="input-group">
                <input type="text" placeholder="الرقم الوطني">
                <i class="fas fa-id-card"></i>
            </div>

            <div class="input-group">
                <input type="email" placeholder="البريد الالكتروني">
                <i class="fas fa-envelope"></i>
            </div>

            <div class="input-group">
                <input type="text" placeholder="رقم الجوال">
                <i class="fas fa-phone"></i>
            </div>

            <div class="input-group">
                <i class="fas fa-eye-slash show-pass"></i>
                <input type="password" placeholder="كلمة المرور">
                <i class="fas fa-lock"></i>
            </div>

            <div class="input-group">
                <i class="fas fa-eye-slash show-pass"></i>
                <input type="password" placeholder="تأكيد كلمة المرور">
                <i class="fas fa-lock"></i>
            </div>

            <button type="submit" class="submit-btn">انشاء حساب</button>
        </form>
    </div>
    
</body>
</html>
