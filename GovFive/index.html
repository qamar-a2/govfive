<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب جديد</title>
    <link rel="stylesheet" href="./log.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    
    <div class="registration-container">
        <div class="header-nav">
           
        </div>

        <div class="logo-section">
            <div class="user-icon-wrapper">
                <i class="fas fa-user-plus"></i>
            </div>
            <h1>انشاء حساب</h1>
            <a href="log.html"></a> 
            <p>أهلاً بك! ابدأ الآن واجعل إنجاز معاملاتك أسهل من أي وقت.</p>
        </div>

        <form class="signup-form">
            <div class="input-group">
                <input type="text" placeholder="الرقم الوطني">
                <i class="fas fa-id-card"></i>
            </div>

            <div class="input-group">
                <input type="email" placeholder="البريد الالكتروني">
                <i class="fas fa-envelope"></i>
            </div>

            <div class="input-group">
                <input type="text" placeholder="الأسم">
                <i class="fas fa-user"></i>
            </div>

            <div class="input-group">
                <input type="text" placeholder="الكنية">
                <i class="fas fa-user"></i>
            </div>

            <div class="input-group">
                <input type="text" placeholder="اسم الأب">
                <i class="fas fa-user"></i>
            </div>

            <div class="input-group">
                <input type="text" placeholder="اسم الأم (بدون الكنية)">
                <i class="fas fa-user"></i>
            </div>

            <div class="input-group">
                <input type="text" placeholder="تاريخ الميلاد">
                <i class="fas fa-birthday-cake"></i>
            </div>

            <div class="input-group">
                <input type="tel" placeholder="رقم الجوال">
                <i class="fas fa-phone"></i>
            </div>

            <div class="input-group">
                <i class="fas fa-eye-slash show-pass"></i>
                <input type="password" placeholder="كلمة المرور">
                <i class="fas fa-lock"></i>
            </div>

            <div class="input-group">
                <i class="fas fa-eye-slash show-pass"></i>
                <input type="password" placeholder="تأكيد كلمة المرور">
                <i class="fas fa-lock"></i>
            </div>

            <button type="submit" class="submit-btn">انشاء حساب</button>
        </form>
    </div>
    
</body>
</html>
