<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد الحساب | Verification</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="global.css">
    <style>
        :root {
            --green-darkest: #042522;
            --gold-main: #968160;
            --bg-main: #f8f3ea;
            --bg-card: rgba(255, 255, 255, 0.88);
            --soft-green: #e5efeb;
            --border: #d8e3df;
            --text-dark: #042522;
            --text-light: #6d837d;
        }

        body {
             background: #f8f3ea;
            min-height: 100vh;
        }

        .glass-card {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow:
                0 10px 40px rgba(4, 37, 34, 0.08),
                0 2px 10px rgba(4, 37, 34, 0.03);
        }

        .icon-box {
            background: #968160;
            box-shadow:
                0 12px 30px rgba(150, 129, 96, 0.22);
        }

        .check-badge {
            background:var(--green-darkest);
        }

        .otp-input {
            background: rgba(255, 255, 255, 0.75);
            border: 2px solid #e2ebe8;
            color: #042522;
            transition: .25s;
        }

        .otp-input:focus {
            border-color: var(--green-darkest);;
            box-shadow:
                0 0 0 4px rgba(150, 129, 96, 0.09);
            outline: none;
            transform: translateY(-2px);
        }

        .verify-btn {
           background:var(--green-darkest);
            box-shadow:
                0 14px 28px rgba(150, 129, 96, 0.25);
            transition: .25s;
        }

        .verify-btn:hover {
            background:#B7A577;
            transform: translateY(-2px);
        }

        .resend-btn {
            color: #042522;
        }
        .resend-btn:hover {
            color: #B7A577;
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen p-4">
    <div class="glass-card max-w-md w-full p-8 rounded-[32px] text-center">
        <!-- ICON -->
        <div class="mb-8 flex justify-center">
            <div
                class="icon-box w-24 h-24 rounded-[28px] flex items-center justify-center relative bg-[#042522]">
                <svg xmlns="http://www.w3.org/2000/svg"
                    class="h-12 w-12 text-[#B7A577]"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="1.5"
                        d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                </svg>
                <div
                    class="check-badge absolute bottom-4 right-4 rounded-full p-1 border-4 border-[#B7A577]">
                    <svg xmlns="http://www.w3.org/2000/svg"
                        class="h-3 w-3 text-white"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round"
                            stroke-linejoin="round"
                            stroke-width="3"
                            d="M5 13l4 4L19 7" />
                    </svg>
                </div>
            </div>
        </div> 

        <!-- TITLE -->

        <h1 class="text-3xl font-bold text-[#B7A577] mb-3">
            أدخل رمز التحقق
        </h1>
        <p class="text-[var(--text-light)] text-sm mb-1 leading-relaxed">
            لقد أرسلنا رمز تأكيد مكون من 6 أرقام إلى بريدك الإلكتروني
        </p>
        <p class="text-[#042522] font-bold mb-8 tracking-wide" id="user-email">
            
        </p>
        <!-- OTP INPUTS -->

      <form id="otp-form">
    <div class="flex justify-between gap-2 mb-10" dir="ltr">
        <input type="text" maxlength="1" class="otp-input w-12 h-14 text-center text-xl font-bold rounded-2xl">
        <input type="text" maxlength="1" class="otp-input w-12 h-14 text-center text-xl font-bold rounded-2xl">
        <input type="text" maxlength="1" class="otp-input w-12 h-14 text-center text-xl font-bold rounded-2xl">
        <input type="text" maxlength="1" class="otp-input w-12 h-14 text-center text-xl font-bold rounded-2xl">
        <input type="text" maxlength="1" class="otp-input w-12 h-14 text-center text-xl font-bold rounded-2xl">
        <input type="text" maxlength="1" class="otp-input w-12 h-14 text-center text-xl font-bold rounded-2xl">
    </div>

    <button type="submit" class="verify-btn w-full text-white font-bold py-4 rounded-2xl active:scale-[0.98]">
        تأكيد الرمز
    </button>
</form>

<div class="mt-8">
    <p class="text-gray-400 text-sm mb-1">
        لم يصلك الرمز؟
    </p>
    <button class="resend-btn font-bold text-sm transition-all">
        إعادة إرسال الرمز
        <span class="text-gray-400 font-normal mr-1">
            (00:59)
        </span>
    </button>
</div>
    </div>

    <script>

        const inputs = document.querySelectorAll('.otp-input');
        inputs.forEach((input, index) => {
            input.addEventListener('input', () => {
                if (input.value && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });
            input.addEventListener('keydown', (e) => {
                if (
                    e.key === 'Backspace' &&
                    !input.value &&
                    index > 0
                ) {

                    inputs[index - 1].focus();
                }
            });
        });

        ////////////////////////////////////////الربط 
        //جلب البريد لمحفوظ من صفحة الانشاء الحساب واستبداله ب يلي مكتوب بالموجود 
        document.addEventListener("DOMContentLoaded" , function(){
            const savemial=localStorage.getItem('tempemail')
            const emailDisplay=document.getElementById('user-email')

            if (savemial && emailDisplay){
                emailDisplay.innerHTML=savemial
            }
            else{
                alert("لم نجد بريدا الكترونيا مفعلا ")
                window.location.href="register.html"
            }


            //حركة التنققل بين المربعات 
            const inputs=document.querySelectorAll(".otp-input")
            
            inputs.forEach((input ,index )=>{
                //للانتقال للرمز يلي بعدو

                input.addEventListener('input' , function (){
                       if(this.value.length==1 && index < inputs.length-1 ){
                    inputs[index+1].focus()
                }
                })
                //لحتى ارجع لورا 

                input.addEventListener('keydown' , function (e){
                       if(e.key==='Backspace' &&  this.value.length==0 && index >0  ){
                    inputs[index - 1].focus()
                }
                })            
            })
        })

        // الربط 
        const otpform=document.getElementById("otp-form")

      otpform.addEventListener("submit" ,async function(e){
        
        e.preventDefault()
        const savedpNationalNumber=localStorage.getItem('tempNationalNumber')
        //تجميع المربعات الستة 
        let otpcode = ""
        inputs.forEach(input =>{
            otpcode +=input.value;
        })
        //تاكد انو دخل ستة ارقام 
        if(otpcode.length<6){
        alert("يرجى ادخال ستة ارقام ")
          return;
           }

  
        /////ارسال طلب للسييرفر 
        try{
            const response = await fetch('http://egovservices.runasp.net/api/Auth/verify-otp',{
                method :'POST',
                headers : {
                    'content-type' : 'application/json'
                },
                body :JSON.stringify({
                    nationalNumber : savedpNationalNumber,
                    otpCode : otpcode
                })
            })

            if(response.ok){
                alert("تم تفعيل حسابك بنجاح! يمكنك الآن تسجيل الدخول.")
                localStorage.removeItem("tempemail")
                localStorage.removeItem("tempNationalNumber")

                window.location.href="choise.html"
            }
              else {
             const errorresult=await response.json().catch(()=>({}))
             alert(errorresult.title || "خطاااا في رمز التحقق")
        }
        }
        catch(error){
            console.error("Error during OTP verification:", error)
           alert("حدث خطأ في الاتصال بالسيرفر، يرجى المحاولة لاحقاً.");
        }
})
       
    

        


    </script>

</body>

</html>
