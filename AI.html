<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="stylesheet" href="global.css">
      <script src="https://cdn.tailwindcss.com"></script>
      <!--  Font awesome-->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- موقع تاني للايقونات  -->
     <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <title>AI</title>
</head>
<body>
   <div id="ai-chat-modal" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/30 backdrop-blur-sm p-4">
    <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl p-6 relative">
        <button onclick="closeChat()" class="absolute top-5 left-4 text-gray-400 hover:text-gray-600 transition">
            <i class="fa-solid fa-xmark text-xl"></i>
        </button>

        <div class="flex  justify-end gap-2 mb-6 text-gov-primary">
            <i class="fa-solid fa-robot  text-xl"></i>
            <h3 class="font-bold text-lg">المساعد الذكي</h3>
        </div>
        <hr class="p-2">

        <div class="mb-6 flex flex-col items-end">
            <p class="text-sm text-gray-600">مرحباً 👋</p>
            <p class="text-sm text-gray-600">أنا المساعد الذكي، كيف يمكنني مساعدتك اليوم؟</p>
        </div>

        <div class="space-y-3 mb-6  text-right text-sm">
            <div class="w-full border border-gray-100 rounded-xl p-3  text-gray-700 hover:bg-gray-50 cursor-pointer transition ">الاستفسار عن معاملة</div>
            <div class="w-full border border-gray-100 rounded-xl p-3  text-gray-700 hover:bg-gray-50 cursor-pointer transition ">متطلبات خدمة معينة</div>
            <div class="w-full border border-gray-100 rounded-xl p-3  text-gray-700 hover:bg-gray-50 cursor-pointer transition">الدعم والمساعدة</div>
            <div class="w-full border border-gray-100 rounded-xl p-3  text-gray-700 hover:bg-gray-50 cursor-pointer transition">اقتراح أو ملاحظة</div>
        </div>

        <div class="relative flex items-center">
            <div class="w-7 h-7 bg-black absolute items-center justify-center rounded-full left-2 ">
                 <i class="fa-solid fa-paper-plane absolute  top-[20%]  left-[50%] -translate-x-1/2 text-gov-gray text-xs "></i>
            </div>
    
            <input type="text" placeholder="اكتب سؤالك هنا" class="w-full bg-gray-50 rounded-xl p-3 pl-10 outline-none text-sm text-right">
        </div>
        
        
    </div>
</div>
</body>
</html>
