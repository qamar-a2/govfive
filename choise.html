<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الخدمات الرقمية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- <script src="HTTPS://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.00/css/all.main.css">
     -->
    <!-- رابط مكتبة Font Awesome لتشغيل الأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* 1. تعريف الخط العادي */
        @font-face {
            font-family: 'Qomra';
            src: url('./fonts/itfQomraArabic-Regular.woff2') format('woff2'),
                url('./fonts/itfQomraArabic-Regular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        /* 2. تعريف الخط العريض */

            font-family: 'Qomra';
            src: url('./fonts/itfQomraArabic-Bold.woff2') format('woff2'),
                url('./fonts/itfQomraArabic-Bold.ttf') format('truetype');
            font-weight: bold;
            font-style: normal;
        }

        body {
            font-family: 'Qomra', sans-serif;
            background-color: #EFEBE3;
        }

        .hero-gradient {
            background: url(image/Untitled-2.png);
            background-size: cover;
        }

        .main-back {
            background-image: url(image/9999999999.png);
            background-size: cover;

        }

</head>

<body class="text-gray-800">
    <div class="main-back parent ">
        <nav class="bg-white/80 backdrop-blur-xl sticky top-1 z-50 shadow-sm rounded-3xl w-[73.5%] mx-auto">
            <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
                <div class="photo "><img src="image/١الجمهورية-العربية-السورية-(1).png" alt="" class="w-[250px] "></div>
                <div class="hidden md:flex space-x-reverse space-x-8 font-bold">
                    <a href="#" class="text-[#96835F] border-b-2 border-[#96835F] pb-1 ">الرئيسية</a>
                    <a href="treatment.html" class="hover:text-[#96835F] transition">المعاملات</a>
                    <a href="prof.html" class="hover:text-[#96835F] transition">الملف الشخصي</a>
                </div>
                <div class="flex items-center gap-3">
                    <a href="index.html"
                        class="bg-[#042522] text-white pl-5 pr-10 py-2 rounded-2xl hover:bg-opacity-90 transition relative">
                        <i class="fa-regular fa-user absolute right-3 top-1/2 -translate-y-1/2 text-sm"></i>
                        <span>دخول</span>
                    </a>

                    <a href="register.html"
                        class="bg-[#042522] text-white pl-5 pr-10 py-2 rounded-2xl hover:bg-opacity-90 transition relative">
                        <i class="fa-regular fa-id-card absolute right-3 top-1/2 -translate-y-1/2 text-sm"></i>
                        <span>إنشاء حساب</span>
                    </a>
                </div>
            </div>
        </nav>

        <header class="max-w-6xl mx-auto px-4 mt-8">
            <div
                class="hero-gradient rounded-3xl h-[250px] text-white shadow-lg flex flex-col md:flex-row justify-between items-center px-12">
                <div class="max-w-lg text-center md:text-right">
                    <h1 class="text-3xl md:text-4xl text-[#B7A577] font-bold mb-4">خدمات جديدة</h1>
                    <p class="text-lg opacity-90 leading-relaxed [word-spacing:0.10rem]">
                        وفر وقتك وأنجز معاملاتك بضغطة زر . استفد من أحدث الخدمات الرقمية السورية المطورة لتسهيل حياتك
                        اليومية.
                    </p>
                </div>
            </div>
        </header>

        <section class="max-w-4xl mx-auto px-4 -mt-8">
            <div class="bg-white rounded-2xl shadow-xl p-2 flex items-center border border-gray-100">
                <input type="text" id="searchInput" placeholder="ابحث عن معاملة (مثلاً: استخراج قيد مدني)..."
                    class="w-full px-6 py-4 rounded-xl outline-none text-lg">
                <button id="searchBtn" class="bg-[#042522] p-4 rounded-xl text-white hover:scale-105 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </button>
            </div>
            <div id="searchResults" class="mt-4"></div>
        </section>

        <main class="max-w-6xl mx-auto px-4 py-16 ">
            <div class="flex justify-between items-end mb-10">
                <h2 class="text-2xl font-bold border-r-4 border-[#96835F] pr-4">الجهات الحكومية:</h2>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-6" id="ministries-grid">
            </div>

    </div>
    </main>
    </div>
    <footer class="bg-[#042522] py-8  border-t border-gray-200">
        <div class="max-w-6xl mx-auto px-4 text-center text-gray-500 text-sm">
            &copy; 2026 جميع الحقوق محفوظة - تطوير قمر المهندسة تنسيق فني رونه
        </div>
    </footer>
    <script>


        //------------- الربط بس جربيه--------------//
        const defaultIcon = `<svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" 
          d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-2 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
        </svg>`;

        async function loadMinistries() {
            const grid = document.getElementById("ministries-grid");
            const token = localStorage.getItem("userToken");

            try {
                const res = await fetch("http://egovservices.runasp.net/api/Ministries", {
                    method: "GET",
                    headers: {
                        "Authorization": `Bearer ${token}`,
                        "Content-Type": "application/json"
                    }
                });
                const result = await res.json();
                const data = result.data

                grid.innerHTML = "";
                data.forEach(ministry => {
                    grid.innerHTML += `
                 <div class="group bg-white p-8 rounded-3xl shadow-sm hover:shadow-xl transition-all duration-300 text-center cursor-pointer border border-transparent hover:border-[#042522]">
                <div class="group bg-white p-8 rounded-3xl shadow-sm cursor-pointer" onclick="window.location.href='main.html?id=${ministry.id}'">
                  <div class="bg-[#f8f6f2] w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6 group-hover:bg-[#042522] group-hover:text-white transition">
                    ${defaultIcon}
                  </div>
                  <h3 class="font-bold text-lg group-hover:text-[#96835F]">${ministry.name}</h3>
                </div>`;
                });
            } catch (err) {
                grid.innerHTML = `<p class="text-red-500 col-span-4 text-center">فشل تحميل الجهات الحكومية</p>`;
                console.error(err);
            }
        }

        loadMinistries();
    </script>

    <script>
        const searchInput = document.getElementById("searchInput");///هون ربط البحث اخوي خخ الله يسعدك
        const searchBtn = document.getElementById("searchBtn");
        const searchResults = document.getElementById("searchResults");

     

        async function searchServices() {
            const query = searchInput.value.trim();
            if (!query) return;

            const token = localStorage.getItem("userToken");
            searchResults.innerHTML = "<p class='text-center'>جاري البحث...</p>";

            try {
                const res = await fetch(`http://egovservices.runasp.net/api/Services/search?q=${encodeURIComponent(query)}`, {
                    method: "GET",
                    headers: {
                        "Authorization": `Bearer ${token}`,
                        "Content-Type": "application/json"
                    }
                });
                const result = await res.json();
                const data = result.data || result; // احتياط لو الشكل مختلف
                console.log("هذه هي البضاعة التي وصلتني:", result);
                searchResults.innerHTML = "";
                if (!data || data.length === 0) {
                    searchResults.innerHTML = "<p class='text-center text-gray-500'>لا توجد نتائج</p>";
                    return;
                }
                data.forEach(item => {
                    searchResults.innerHTML += `
  <div class="relative bg-white p-4 rounded-xl shadow-sm mb-3">

    ${item.serviceTypeLabel ? `
    <span class="absolute  top-4 left-4 bg-green-50 border border-green-300 text-green-700 text-xs px-3 py-1 rounded-full">
      ${item.serviceTypeLabel}
    </span>` : ''}

    <h4 class="font-bold text-lg">${item.name}</h4>
    <p class="text-sm text-gray-500">${item.ministryName}</p>
    <p class="text-sm text-gray-600 mt-2">${item.description}</p>

    <div class="flex justify-between items-center mt-3 text-sm">
      <span>الرسوم: ${item.serviceFee} ل.س</span>
    </div>

    <div class="flex justify-end mt-3">
      <button class="bg-[#042522] text-white px-5 py-2 rounded-xl text-sm hover:scale-105 transition"
              onclick="startService(${item.id})">
        بدء الخدمة
      </button>
    </div>
  </div>`;
                });

            } catch (err) {
                searchResults.innerHTML = "<p class='text-red-500 text-center'>حدث خطأ بالبحث</p>";
                console.error(err);
            }
        }

        searchBtn.addEventListener("click", searchServices);

        // تفعيل enter
           searchInput.addEventListener("keypress" , (event)=>{
            if(event.key === "Enter"){
                searchServices();
            }
        })

        // مسح محتوى 
        searchInput.addEventListener("input" , (event)=>{
            if(searchInput.value.trim()===""){
                searchResults.innerHTML=""
            }
        })
    </script>

</body>

</html>
