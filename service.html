<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>نموذج الخدمة</title>
  <link rel="stylesheet" href="global.css">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #EFEBE3; 
      color: #042522; 
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container { max-width: 900px; margin: 0 auto; }

    .service-card,
    .form-card {
      background: #fff;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.07);
      margin-bottom: 32px;
    }
.form-card{
  background-image: url(/GovFive/image/شعارwhite.png);
  background-size: cover;
  background-position: center;
}
    .service-title {
      font-size: 30px;
      font-weight: bold;
      color: #96835F;
      margin-bottom: 8px;
    }

    .service-desc {
      font-size: 15px;
      color: #042522;
      /* opacity: 0.8; */
      margin-bottom: 12px;
      font-weight: 600;
    }

    .service-meta span {
      font-size: 14px;
      color: #96835F;
      font-weight: 600;
    }

    .service-meta { display: flex; gap: 24px; flex-wrap: wrap; }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .field-wrapper {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field-wrapper.full-width { grid-column: span 2; }

    label {
      font-size: 14px;
      font-weight: 600;
      color: #042522;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1.2px solid #ccc;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      background: #fff;
      color: #042522;
      outline: none;
      transition: border-color 0.2s;
    }

    /* فوكس أخضر */
    input:focus,
    select:focus,
    textarea:focus {
      border-color: #2e6b4f;
       box-shadow:
                0 0 0 4px rgba(150, 129, 96, 0.09);
    }

    .submit-btn {
      margin-top: 28px;
      width: 100%;
      padding: 14px;
      background:#042522;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .submit-btn:hover { opacity: 0.9; }

    .file-picker {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border: 1.2px solid #ccc;
      border-radius: 10px;
      cursor: pointer;
    }

    .file-picker:hover {
      border-color: #2e6b4f;
    }

    .file-picker.selected {
      border-color: #2e6b4f;
    }

    .file-picker-icon { color: #042522; font-size: 20px; }

    .help-text { font-size: 12px; color: #555; }

    .error-text { font-size: 12px; color: red; display: none; }
    .error-text.visible { display: block; }

    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
      .field-wrapper.full-width { grid-column: span 1; }
    }
  </style>
</head>

<body>
<div class="container">
  <div class="service-card" id="service-info"></div>

  <div class="form-card">
    <form id="dynamic-form" novalidate>
      <div class="form-grid" id="form-fields"></div>
      <button type="submit" class="submit-btn">إرسال الطلب</button>
    </form>
  </div>
</div>

<script>
  var serviceData = {
    serviceId: "22222222-2222-2222-2222-222222222222",
    serviceName: "تجديد جواز السفر",
    description: "خدمة تجديد جواز السفر منتهي الصلاحية",
    requirements: "صورة شخصية + جواز السفر القديم + إثبات السكن",
    serviceFee: 150,
    fields: [
      { name: "fullName", label: "الاسم الكامل", type: "text", required: true },
      { name: "nationalNumber", label: "رقم الهوية الوطنية", type: "text", required: true },
      { name: "phoneNumber", label: "رقم الجوال", type: "tel", required: true },
      { name: "email", label: "البريد الإلكتروني", type: "email", required: true },
      { name: "currentAddress", label: "العنوان الحالي", type: "textarea", required: true },
      { name: "personalPhoto", label: "صورة شخصية حديثة", type: "file", required: true, metadata: { maxSizeMb: 5 } },
      { name: "preferredPickupDate", label: "تاريخ الاستلام المفضل", type: "date", required: true },
      { name: "maritalStatus", label: "الحالة الاجتماعية", type: "select", required: true,
        options: [
          { value: "single", label: "أعزب/عزباء" },
          { value: "married", label: "متزوج/متزوجة" },
          { value: "divorced", label: "مطلق/مطلقة" },
          { value: "widowed", label: "أرمل/أرملة" }
        ]
      }
    ]
  };
  // fakeData 2 - شهادة عدم المحكومية(علقي الأول وشغلي هاد) 
 /////////////////        لا  تحذفيا هاا     /////////////
 /* var serviceData = {
            serviceId: "e0a736ff-44ef-4eba-a1f2-1c04f7870829",
            serviceName: "شهادة عدم المحكومية",
            description: "وثيقة رسمية تثبت خلو السجل الجنائي للمواطن",
            requirements: "الهوية الوطنية",
            serviceFee: 50,
            fields: [
                {
                    name: "purposeOfRequest", label: "الغرض من الطلب", type: "text", required: true, order: 1,
                    placeholder: "مثال: تقديم طلب عمل، استخراج تأشيرة...",
                    validation: { minLength: 5, maxLength: 200 }
                }
            ]
        };
*/
  function buildServiceInfo(data) {
    var el = document.getElementById('service-info');

    el.innerHTML =
      `<div class="service-title">${data.serviceName}</div>
       <div class="service-desc">${data.description}</div>
       <div class="service-meta">
         <span>المتطلبات: ${data.requirements}</span>
         <span>رسوم الخدمة: ${data.serviceFee} ل.س</span>
       </div>`;
  }

  function buildForm(data) {
    var container = document.getElementById('form-fields');

    data.fields.forEach(function(field) {
      var wrapper = document.createElement('div');
      wrapper.className = 'field-wrapper' + (field.type === 'textarea' || field.type === 'file' ? ' full-width' : '');

      var label = document.createElement('label');
      label.textContent = field.label;
      wrapper.appendChild(label);

      var input;

      if (field.type === 'textarea') {
        input = document.createElement('textarea');
      } else if (field.type === 'select') {
        input = document.createElement('select');
        field.options.forEach(function(opt) {
          var o = document.createElement('option');
          o.value = opt.value;
          o.textContent = opt.label;
          input.appendChild(o);
        });
      } else {
        input = document.createElement('input');
        input.type = field.type;
      }

      input.name = field.name;
      input.id = field.name;

      wrapper.appendChild(input);
      container.appendChild(wrapper);
    });
  }

  buildServiceInfo(serviceData);
  buildForm(serviceData);
</script>
</body>
</html>
