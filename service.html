<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>نموذج الخدمة</title>
  <link rel="stylesheet" href="global.css">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #EFEBE3;
      color: #042522;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .service-card,
    .form-card {
      background: #fff;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.07);
      margin-bottom: 32px;
    }

    .form-card {
      background-image: url(/GovFive/image/شعارwhite.png);
      background-size: cover;
      background-position: center;
    }

    .service-title {
      font-size: 30px;
      font-weight: bold;
      color: #96835F;
      margin-bottom: 8px;
    }

    .service-desc {
      font-size: 15px;
      color: #042522;
      /* opacity: 0.8; */
      margin-bottom: 12px;
      font-weight: 600;
    }

    .service-meta span {
      font-size: 14px;
      color: #96835F;
      font-weight: 600;
    }

    .service-meta {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .field-wrapper {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field-wrapper.full-width {
      grid-column: span 2;
    }

    label {
      font-size: 14px;
      font-weight: 600;
      color: #042522;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1.2px solid #ccc;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      background: #fff;
      color: #042522;
      outline: none;
      transition: border-color 0.2s;
    }

    /* فوكس أخضر */
    input:focus,
    select:focus,
    textarea:focus {
      border-color: #2e6b4f;
      box-shadow:
        0 0 0 4px rgba(150, 129, 96, 0.09);
    }

    .submit-btn {
      margin-top: 28px;
      width: 100%;
      padding: 14px;
      background: #042522;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .submit-btn:hover {
      opacity: 0.9;
    }

    .file-picker {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border: 1.2px solid #ccc;
      border-radius: 10px;
      cursor: pointer;
    }

    .file-picker:hover {
      border-color: #2e6b4f;
    }

    .file-picker.selected {
      border-color: #2e6b4f;
    }

    .file-picker-icon {
      color: #042522;
      font-size: 20px;
    }

    .help-text {
      font-size: 12px;
      color: #555;
    }

    .error-text {
      font-size: 12px;
      color: red;
      display: none;
    }

    .error-text.visible {
      display: block;
    }

    @media (max-width: 600px) {
      .form-grid {
        grid-template-columns: 1fr;
      }

      .field-wrapper.full-width {
        grid-column: span 1;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="service-card" id="service-info"></div>

    <div class="form-card">
      <form id="dynamic-form" novalidate>
        <div class="form-grid" id="form-fields"></div>
        <button type="submit" class="submit-btn">إرسال الطلب</button>
      </form>
    </div>
  </div>
  
  <script>
    //--------------هون الربط---------------/
    const params = new URLSearchParams(window.location.search);
    const serviceId = params.get("id");
    const token = localStorage.getItem("userToken");
    const BASE = "http://egovservices.runasp.net";
  
    async function loadServiceSchema() {
      if (!serviceId) return;
  
      try {
        const res = await fetch(BASE + "/api/Services/" + serviceId + "/schema", {
          headers: { "Authorization": "Bearer " + token }
        });
        const result = await res.json();
        const schema = result.data || result;
  
        document.getElementById("service-info").innerHTML =
          "<h2>" + schema.serviceName + "</h2>" +
          "<p>" + schema.description + "</p>" +
          "<p>المتطلبات: " + schema.requirements + "</p>" +
          "<p>الرسوم: " + schema.serviceFee + " ل.س</p>" +
          "<span>" + schema.serviceTypeLabel + "</span>";
  
        const formFields = document.getElementById("form-fields");
        formFields.innerHTML = "";
  
        schema.fields.forEach(function(field) {
          let inputHTML = "";
  
          if (field.type === "select" && field.options) {
            inputHTML = "<select name='" + field.name + "' " + (field.required ? "required" : "") + ">";
            inputHTML += "<option value=''>اختر...</option>";
            field.options.forEach(function(o) {
              inputHTML += "<option value='" + o.value + "'>" + o.label + "</option>";
            });
            inputHTML += "</select>";
          } else if (field.type === "textarea") {
            inputHTML = "<textarea name='" + field.name + "' placeholder='" + field.label + "' " + (field.required ? "required" : "") + "></textarea>";
          } else {
            inputHTML = "<input type='" + field.type + "' name='" + field.name + "' placeholder='" + field.label + "' " + (field.required ? "required" : "") + ">";
          }
  
          formFields.innerHTML += "<div class='field-wrapper'><label>" + field.label + "</label>" + inputHTML + "</div>";
        });
  
      } catch (err) {
        console.error(err);
      }
    }
  
    loadServiceSchema();
  </script>

</body>

</html>
