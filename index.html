<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب جديد</title>
    <link rel="stylesheet" href="register.css">
      <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="h-screen w-screen overflow-hidden flex justify-center items-center m-0 p-0">

    <!-- هاد مشان ينحط بقلبو الخطا  تبع السيرفر -->
    <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col gap-2"></div>
<div class=" fixed inset-0 overflow-hidden pointer-events-none z-0">
       <div class="icon1 parent-icon-up icon ">
            <img src="image/icons/5.svg" alt="">
        </div>
     <div class="icon2 parent-icon-down icon">
            <img src="image/icons/7.svg" alt="">
        </div>
     <div class="icon3 parent-icon-float icon">
            <img src="image/icons/8.svg" alt="">
        </div>
           <div class="icon4 parent-icon-Wave icon">
            <img src="image/icons/2.svg" alt="">
        </div>
        <!-- -------------------------- -->
         <div class="point point1 parent-icon-float"></div>
         <div class="point point2"></div>
         <div class="point point3 parent-icon-scale"></div>
         <div class="point point4 "></div>
         <div class="point point5 parent-icon-Wave2"></div>
         <div class="point point6 parent-icon-float"></div>
</div>
  

    
    <div class="registration-container w-[85%] max-w-[320px] mx-auto p-4 sm:p-6">
        <div class="header-nav">
           
        </div>

        <div class="logo-section">
            <div class="user-icon-wrapper">
                <i class="fas fa-user-plus"></i>
            </div>
            <h1 class="   pt-4">انشاء حساب</h1>
            <a href="log.html"></a> 
            <p class="text-xs sm:text-sm pt-2 text-center px-4">أهلاً بك! ابدأ الآن واجعل إنجاز معاملاتك أسهل من أي وقت.</p>
        </div>

        <form class="signup-form" id="signup">
            <div class="input-group">
                <input type="text" placeholder="الرقم الوطني" id="nationalNumber" autocomplete="off" class="w-full autofill:shadow-[inset_0_0_0_1000px_#062C28] autofill:text-white autofill:[-webkit-text-fill-color:white]" required>
                <span id="nationalNumber-error" class="block w-full  text-[10px]  text-[#888] pt-1"></span>
                <i class="fas fa-id-card"></i>
            </div>

            <div class="input-group">
                <input type="email" placeholder="البريد الالكتروني" id="email" class=" w-full autofill:shadow-[inset_0_0_0_1000px_#062C28] autofill:text-white autofill:[-webkit-text-fill-color:white]" required>
                    <span id="email-error" class="block w-full  text-[10px]  text-[#888] pt-1"></span>
                <i class="fas fa-envelope"></i>
            </div>

            <div class="input-group">
                <input type="text" placeholder="رقم الجوال" id="phoneNumber" autocomplete="off" class="w-full autofill:shadow-[inset_0_0_0_1000px_#062C28] autofill:text-white autofill:[-webkit-text-fill-color:white]" required>
                    <span id="phoneNumber-error" class="block w-full  text-[10px]  text-[#888] pt-1"></span>
                <i class="fas fa-phone"></i>
            </div>

            <div class="input-group">
                <i class="fas fa-eye-slash show-pass toggle-password" data-target="password"></i>
                <input type="password" placeholder="كلمة المرور" id="password" autocomplete="off" class="w-full autofill:shadow-[inset_0_0_0_1000px_#062C28] autofill:text-white autofill:[-webkit-text-fill-color:white]" required>
                    <span id="password-error" class="block w-full  text-[10px]  text-[#888] pt-1"></span>
                <i class="fas fa-lock"></i>
            </div>

            <div class="input-group">
                <i class="fas fa-eye-slash show-pass toggle-password" data-target="confirmPassword"></i>
                <input type="password" placeholder="تأكيد كلمة المرور" id="confirmPassword" autocomplete="off" class="w-full autofill:shadow-[inset_0_0_0_1000px_#062C28] autofill:text-white autofill:[-webkit-text-fill-color:white]" required>
                <span id="confirmPassword-error" class="block w-full  text-[10px]  text-[#888] pt-1"></span>
                <i class="fas fa-lock"></i>
            </div>

            <button type="submit" class="submit-btn">انشاء حساب</button>
        </form>
    </div>


    <!-- javaScript -->
    <script>
     const toggleIcons = document.querySelectorAll('.toggle-password');
    
    toggleIcons.forEach(function(icon) {
        icon.addEventListener('click', function() {
            const targetId = this.getAttribute('data-target');
            const passwordInput = document.getElementById(targetId);
            
            if (passwordInput) { //منتاكد من أنو العنصر موجود لمنع الأخطاء
                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    this.classList.replace('fa-eye-slash', 'fa-eye');
                } else {
                    passwordInput.type = 'password';
                    this.classList.replace('fa-eye', 'fa-eye-slash');
                }
            }
        });
    });
    //  لاظهار الخطا بطريقة جميلة 
    function showToast(message, type = 'error') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `p-4 rounded-lg shadow-xl text-white transition-opacity duration-500 ${type === 'error' ? 'bg-red-600' : 'bg-green-600'}`;
    toast.textContent = message;
    container.appendChild(toast);
    
    setTimeout(() => {
        toast.style.opacity = '0';
        setTimeout(() => toast.remove(), 1000);
    }, 1000);
}
// اذا وصل الطلب بس رفضو السيرفر بيطلع الخطا 
        










        //1.منع تحديث الصفحة
        document.getElementById("signup").addEventListener("submit",async function(e){
            e.preventDefault()//مابخلي الصفحة تعمل اعادة تحديث
        
        //2. بجيب العناصر الاساسية 
        const nationalNumber=document.getElementById("nationalNumber").value
        const email=document.getElementById("email").value
        const phoneNumber=document.getElementById("phoneNumber").value
        const password=document.getElementById("password").value
        const confirmPassword=document.getElementById("confirmPassword").value


        const national_error=document.getElementById("nationalNumber-error")
        const email_error=document.getElementById("email-error")
        const phoneNumber_error=document.getElementById("phoneNumber-error")
        const password_error=document.getElementById("password-error")
        const confirmPassword_error=document.getElementById("confirmPassword-error")

        national_error.textContent=""
        email_error.textContent=""
       phoneNumber_error.textContent=""
        password_error.textContent=""
        confirmPassword_error.textContent=""

        // مناقشات الاخطاء

        let haserror=false
        if(nationalNumber.length !== 11){
              e.preventDefault()//مابخلي الصفحة تعمل اعادة تحديث
              national_error.textContent="رقم الهوية يجب أن يكون 11 رقم"
              haserror=true
        }
        else{
            console.log("الرقم صحيح جاري الارسال...")
        }
        // phooone
        if(phoneNumber.length !== 10){
             e.preventDefault()//مابخلي الصفحة تعمل اعادة تحديث
              phoneNumber_error.textContent="رقم الجوال  يجب أن يكون 10 ارقام"  
               haserror=true   
                  
        }
        else if(!phoneNumber.startsWith('09')){
              e.preventDefault()//مابخلي الصفحة تعمل اعادة تحديث
              phoneNumber_error.textContent="رقم الجوال  يجب أن ييدا ب 09"    
              haserror=true
        }
        else if(isNaN(phoneNumber)){
            e.preventDefault()//مابخلي الصفحة تعمل اعادة تحديث
              phoneNumber_error.textContent="يجب الحقل أن يكون رقم "    
              haserror=true
        }  
          if(password.length <8){
              e.preventDefault()//مابخلي الصفحة تعمل اعادة تحديث
             password_error.textContent="يجب أن تكون كلمة السر على الأقل 8 "    
              haserror=true
          }

        if(password !== confirmPassword){
               e.preventDefault()//مابخلي الصفحة تعمل اعادة تحديث
            confirmPassword_error.textContent="كلمتا المرور غير متطابقتين!"
            haserror=true
    
        }

        if(haserror)return;//هي ما بتخلي يبعت طلب للسيرفر لحتى يتاكد من كلشي قبل 


    


        //3.ارسال طلب الى الاستضافة 
        try{
            const response=await fetch('http://egovservices.runasp.net/api/Auth/register',{
                method :'POST',
                headers:{
                  'Content-Type' : 'application/json'
                },
                body:JSON.stringify({
                    nationalNumber :nationalNumber,
                    email : email,
                    phoneNumber :phoneNumber ,
                    password : password
                })               
        })
        //4. قراءة رد السيرفر

        const data = await response.json();
        if(response.ok){
            localStorage.setItem('tempemail',email)
            localStorage.setItem('tempNationalNumber', nationalNumber);
            window.location.href="otp.html"
        }
        //لو استقبل  الطلب بس رفضو 
        else {
          showToast(data.message || "حدث خطأ غير متوقع", "error");
            // alert(data.message || "حدث خطأ غير متوقع من السيرفر");
           
        }
    }
    //5. لو صار خطا بالتراي بنزل عالكاتش 
        catch(error){
            // console.error("Error during registration:", error);//خطا بيطهر بالكونسرل مشان انا كمهندس اعرف اش نوع الخطا
            // alert("حدث خطأ في الاتصال بالسيرفر، يرجى المحاولة لاحقاً")
          showToast("حدث خطأ في الاتصال بالسيرفر", error);
        }
        })
        

    </script>
</body>
</html>
