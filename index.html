<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول</title>
    <link rel="stylesheet" href="log1.css">
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="loader" class="fixed inset-0 z-[9999] hidden items-center justify-center bg-[#062C28]/90">
    <div class="text-white text-center">
        <div class="w-12 h-12 border-4 border-t-transparent border-white rounded-full animate-spin mx-auto mb-4"></div>
        <p class="font-[Qomra] text-lg">جاري المعالجة...</p>
    </div>
</div>


    <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col gap-2"></div>
    
    <div class=" fixed inset-0 overflow-hidden pointer-events-none z-0">
       
   
    <!-- --------------------------------------------------------------- -->
         <div class="icon1 parent-icon-up icon">
            <img src="image/icons/1.svg" alt="">
        </div>
     <div class="icon2 parent-icon-down icon">
            <img src="image/icons/3.svg" alt="">
        </div>
     <div class="icon3 parent-icon-float icon">
            <img src="image/icons/4.svg" alt="">
        </div>
           <div class="icon4 parent-icon-Wave icon">
            <img src="image/icons/6.svg" alt="">
        </div>
        <!-- -------------------------- -->
         <div class="point point1 parent-icon-float"></div>
         <div class="point point2"></div>
         <div class="point point3 parent-icon-scale"></div>
         <div class="point point4 "></div>
         <div class="point point5 parent-icon-Wave2"></div>
         <div class="point point6 parent-icon-float"></div>
    </div>
    



   <div class="login-container w-[85%] max-w-[450px] mx-auto p-0 sm:p-0 mt-[-120px] sm:mt-0">
        <div class="header-nav">
          
        </div>

        <div class="icon-section p-4">
            <div class="login-icon-wrapper">
                <i class="fas fa-sign-in-alt"></i>
            </div>
            <h1 class="pt-2 sm:pt-4 sm:pb-4 text-xl sm:text-[2rem] font-[Qomra] font-bold">تسجيل الدخول</h1>
            <p>أهلاً بك! تابع معاملاتك بكل سهولة من خلال تسجيل الدخول</p>
        </div>
       
        <form class="login-form" id="loginform">
            <div class="input-group">
                <input type="text" placeholder=" الرقم الوطني" id="nationalNumber" class="w-full autofill:shadow-[inset_0_0_0_1000px_#062C28] autofill:text-white autofill:[-webkit-text-fill-color:white]" required >
                  <span id="nationalNumber-error" class="block w-full  text-[10px]  text-[#888] pt-1"></span>
                <i class="fas fa-id-card"></i>
            </div>

            <div class="input-group">
                <i class="fas fa-eye-slash toggle-password" data-target="password"></i>
                <input type="password"  placeholder="كلمة المرور"  id="password">
                  <span id="password-error" class="block w-full  text-[10px]  text-[#888] pt-1"></span>
                <i class="fas fa-lock"></i>
            </div>
<button type="submit" class="submit-btn">تسجيل الدخول</button>
            <div class="desc">
                <span>ليس لديك حساب؟</span>
                <a href="register.html">انشاء حساب</a>
            </div>

            
        </form>
    </div> 

    <script>
        const toggleIcon = document.querySelector('.toggle-password');
        toggleIcon.addEventListener('click', function() {
            const passwordInput = document.getElementById(this.getAttribute('data-target'));
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                this.classList.replace('fa-eye-slash', 'fa-eye');
            } else {
                passwordInput.type = 'password';
                this.classList.replace('fa-eye', 'fa-eye-slash');
            }
        });
        // ----------------
         //  لاظهار الخطا بطريقة جميلة 
    function showToast(message, type = 'error') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `p-4 rounded-lg shadow-xl text-white transition-opacity duration-500 ${type === 'error' ? 'bg-red-600' : 'bg-green-600'}`;
    toast.textContent = message;
    container.appendChild(toast);
    
    setTimeout(() => {
        toast.style.opacity = '0';
        setTimeout(() => toast.remove(), 1000);
    }, 1000);
}
// ---------------------------------

//  -------------------------------------------
        // /////////////////                الربط                  /////////////////////////
      document.getElementById("loginform").addEventListener("submit", async function(e) {
    e.preventDefault();

    const loader = document.getElementById("loader");
    const nationalNumber = document.getElementById("nationalNumber").value;
    const password = document.getElementById("password").value;

    const national_error = document.getElementById("nationalNumber-error");
    const password_error = document.getElementById("password-error");

   
    national_error.textContent = "";
    password_error.textContent = "";


    let hasError = false;
    if (nationalNumber.length !== 11) {
        national_error.textContent = "رقم الهوية يجب أن يكون 11 رقم";
        hasError = true;
    }
    if (password.length < 8) {
        password_error.textContent = "يجب أن تكون كلمة السر 8 خانات على الأقل";
        hasError = true;
    }

    if (hasError) return; 

   
    loader.classList.replace("hidden", "flex");

    try {
        const response = await fetch('http://egovservices.runasp.net/api/Auth/login', {
            method: 'POST',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify({ nationalNumber, password })
        });
        
        const result = await response.json();

        if (result.success === true) {
            localStorage.setItem('userToken', result.data.token);
            window.location.href = "choise.html";
        } else {
            showToast(result.message || "حدث خطأ غير متوقع", "error");
        }
    } catch (error) {
        showToast("حدث خطأ في الاتصال بالسيرفر", "error");
    } finally {
        loader.classList.replace("flex", "hidden");
    }
});

    </script>
</body>
</html>
