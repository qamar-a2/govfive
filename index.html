<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب جديد</title>
    <link rel="stylesheet" href="register.css">
      <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="min-h-screen p-4 sm:p-6 overflow-x-hidden">

     <div class="icon1 parent-icon-up icon">
            <img src="/GovFive/image/icons/5.svg" alt="">
        </div>
     <div class="icon2 parent-icon-down icon">
            <img src="/GovFive/image/icons/7.svg" alt="">
        </div>
     <div class="icon3 parent-icon-float icon">
            <img src="/GovFive/image/icons/8.svg" alt="">
        </div>
           <div class="icon4 parent-icon-Wave icon">
            <img src="/GovFive/image/icons/2.svg" alt="">
        </div>
        <!-- -------------------------- -->
         <div class="point point1 parent-icon-float"></div>
         <div class="point point2"></div>
         <div class="point point3 parent-icon-scale"></div>
         <div class="point point4 "></div>
         <div class="point point5 parent-icon-Wave2"></div>
         <div class="point point6 parent-icon-float"></div>

    
    <div class="registration-container w-full max-w-[360px] sm:max-w-md">
        <div class="header-nav">
           
        </div>

        <div class="logo-section">
            <div class="user-icon-wrapper">
                <i class="fas fa-user-plus"></i>
            </div>
            <h1>انشاء حساب</h1>
            <a href="log.html"></a> 
            <p>أهلاً بك! ابدأ الآن واجعل إنجاز معاملاتك أسهل من أي وقت.</p>
        </div>

        <form class="signup-form" id="signup">
            <div class="input-group">
                <input type="text" placeholder="الرقم الوطني" id="nationalNumber" autocomplete="off" class="w-full">
                <span id="nationalNumber-error"></span>
                <i class="fas fa-id-card"></i>
            </div>

            <div class="input-group">
                <input type="email" placeholder="البريد الالكتروني" id="email" class=" w-full autofill:shadow-[inset_0_0_0_1000px_#062C28] autofill:text-white autofill:[-webkit-text-fill-color:white]">
                    <span id="email-error"></span>
                <i class="fas fa-envelope"></i>
            </div>

            <div class="input-group">
                <input type="text" placeholder="رقم الجوال" id="phoneNumber" autocomplete="off" class="w-full">
                    <span id="phoneNumber-error" ></span>
                <i class="fas fa-phone"></i>
            </div>

            <div class="input-group">
                <i class="fas fa-eye-slash show-pass toggle-password" data-target="password"></i>
                <input type="password" placeholder="كلمة المرور" id="password" autocomplete="off" class="w-full">
                    <span id="password-error"></span>
                <i class="fas fa-lock"></i>
            </div>

            <div class="input-group">
                <i class="fas fa-eye-slash show-pass toggle-password" data-target="confirmPassword"></i>
                <input type="password" placeholder="تأكيد كلمة المرور" id="confirmPassword" autocomplete="off" class="w-full">
                <span id="confirmPassword-error" class="block w-full  text-[10px]  text-[#888] pt-1"></span>
                <i class="fas fa-lock"></i>
            </div>

            <button type="submit" class="submit-btn">انشاء حساب</button>
        </form>
    </div>


    <!-- javaScript -->
    <script>
     const toggleIcons = document.querySelectorAll('.toggle-password');
    
    toggleIcons.forEach(function(icon) {
        icon.addEventListener('click', function() {
            const targetId = this.getAttribute('data-target');
            const passwordInput = document.getElementById(targetId);
            
            if (passwordInput) { // التأكد من أن العنصر موجود لمنع الأخطاء
                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    this.classList.replace('fa-eye-slash', 'fa-eye');
                } else {
                    passwordInput.type = 'password';
                    this.classList.replace('fa-eye', 'fa-eye-slash');
                }
            }
        });
    });
        










        //1.منع تحديث الصفحة
        document.getElementById("signup").addEventListener("submit",async function(e){
            e.preventDefault()//مابخلي الصفحة تعمل اعادة تحديث
        
        //2. بجيب العناصر الاساسية 
        const nationalNumber=document.getElementById("nationalNumber").value
        const email=document.getElementById("email").value
        const phoneNumber=document.getElementById("phoneNumber").value
        const password=document.getElementById("password").value
        const confirmPassword=document.getElementById("confirmPassword").value


        const national_error=document.getElementById("nationalNumber-error")
        const email_error=document.getElementById("email-error")
        const phoneNumber_error=document.getElementById("phoneNumber-error")
        const password_error=document.getElementById("password-error")
        const confirmPassword_error=document.getElementById("confirmPassword-error")

        national_error.textContent=""
        email_error.textContent=""
       phoneNumber_error.textContent=""
        password_error.textContent=""
        confirmPassword_error.textContent=""

        if(password !== confirmPassword){
            confirmPassword_error.textContent="كلمتا المرور غير متطابقتين!"
            return;
        }



        //3.ارسال طلب الى الاستضافة 
        try{
            const response=await fetch('http://egovservices.runasp.net/api/Auth/register',{
                method :'POST',
                headers:{
                  'Content-Type' : 'application/json'
                },
                body:JSON.stringify({
                    nationalNumber :nationalNumber,
                    email : email,
                    phoneNumber :phoneNumber ,
                    password : password
                })               
        })
        //4. قراءة رد السيرفر
        if(response.ok){
            localStorage.setItem('tempemail',email)
            localStorage.setItem('tempNationalNumber', nationalNumber);
            window.location.href="otp.html"
        }
        //لو استقبل  الطلب بس رفضو 
        else {
             const errorresult=await response.json().catch(()=>({}))
             alert(errorresult.message || "خطاااا")
             console.log("كائن الرد الكامل من الباك إند:", errorresult);

            //  لاتحقق من وجود خطا 
            // if(errorresult && errorresult.errors.nationalNumber){
            //     national_error.textContent=errorresult.errors.nationalNumber[0]
            // }
        }
    }
    //5. لو صار خطا بالتراي بنزل عالكاتش 
        catch(error){
            console.error("Error during registration:", error);//خطا بيطهر بالكونسرل مشان انا كمهندس اعرف اش نوع الخطا
            alert("حدث خطأ في الاتصال بالسيرفر، يرجى المحاولة لاحقاً")
        }
        })
        

    </script>
</body>
</html>
