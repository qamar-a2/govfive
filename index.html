<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب جديد</title>
        <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="register.css">

      <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="h-screen w-screen overflow-hidden flex justify-center items-center m-0 p-0">

    <!-- هاد مشان ينحط بقلبو الخطا  تبع السيرفر -->
    <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col gap-2"></div>
    <!-- هاد للودينغ -->
     <div id="loader" class="fixed inset-0 z-[9999] hidden flex items-center justify-center bg-[#062C28]/90">
         <div class="text-white text-center">
            <div class="w-12 h-12 border-4 border-t-transparent border-white rounded-full animate-spin mx-auto mb-4"></div>
            <p class="font-[Qomra] text-lg">جاري المعالجة...</p>
         </div>
    </div>
<!-- ----------------------------- -->
<div class=" fixed inset-0 overflow-hidden pointer-events-none z-0">
       <div class="icon1 parent-icon-up icon ">
            <img src="image/icons/5.svg" alt="">
        </div>
     <div class="icon2 parent-icon-down icon">
            <img src="image/icons/7.svg" alt="">
        </div>
     <div class="icon3 parent-icon-float icon">
            <img src="image/icons/8.svg" alt="">
        </div>
           <div class="icon4 parent-icon-Wave icon">
            <img src="image/icons/2.svg" alt="">
        </div>
        <!-- -------------------------- -->
         <div class="point point1 parent-icon-float"></div>
         <div class="point point2"></div>
         <div class="point point3 parent-icon-scale"></div>
         <div class="point point4 "></div>
         <div class="point point5 parent-icon-Wave2"></div>
         <div class="point point6 parent-icon-float"></div>
</div>
  

    
    <div class="registration-container w-[85%] max-w-[450px] mx-auto p-0 sm:p-0 mt-[-120px] sm:mt-0">
        <div class="header-nav">
           
        </div>

        <div class="logo-section pt-2 sm:pt-4">
            <div class="user-icon-wrapper -mt-4 -mb-4 pb-0 sm:-mt-0 sm:-mb-2 ">
                <i class="fas fa-user-plus"></i>
            </div>
            <h1 class="pt-2 sm:pt-4 sm:pb-2 text-xl sm:text-[2rem] font-[Qomra] font-bold ">انشاء حساب</h1>
            <a href="log.html"></a> 
            <p class="text-xs sm:text-sm pt-1 sm:pt-2 text-center px-4">أهلاً بك! ابدأ الآن واجعل إنجاز معاملاتك أسهل من أي وقت.</p>
        </div>

        <form class="signup-form  " id="signup">
            <div class="input-group mb-2 sm:mb-4">
                <input type="text" placeholder="الرقم الوطني" id="nationalNumber" autocomplete="off" class="w-full autofill:shadow-[inset_0_0_0_1000px_#062C28] autofill:text-white autofill:[-webkit-text-fill-color:white]" required>
                <span id="nationalNumber-error" class="block w-full  text-[10px]  text-[#888] pt-1"></span>
                <i class="fas fa-id-card"></i>
            </div>

            <div class="input-group mb-2 sm:mb-4">
                <input type="email" placeholder="البريد الالكتروني" id="email" class=" w-full autofill:shadow-[inset_0_0_0_1000px_#062C28] autofill:text-white autofill:[-webkit-text-fill-color:white]" required>
                    <span id="email-error" class="block w-full  text-[10px]  text-[#888] pt-1"></span>
                <i class="fas fa-envelope"></i>
            </div>

            <div class="input-group mb-2 sm:mb-4">
                <input type="text" placeholder="رقم الجوال" id="phoneNumber" autocomplete="off" class="w-full autofill:shadow-[inset_0_0_0_1000px_#062C28] autofill:text-white autofill:[-webkit-text-fill-color:white]" required>
                    <span id="phoneNumber-error" class="block w-full  text-[10px]  text-[#888] pt-1"></span>
                <i class="fas fa-phone"></i>
            </div>

            <div class="input-group mb-2 sm:mb-4">
                <i class="fas fa-eye-slash show-pass toggle-password" data-target="password"></i>
                <input type="password" placeholder="كلمة المرور" id="password" autocomplete="off" class="w-full autofill:shadow-[inset_0_0_0_1000px_#062C28] autofill:text-white autofill:[-webkit-text-fill-color:white]" required>
                    <span id="password-error" class="block w-full  text-[10px]  text-[#888] pt-1"></span>
                <i class="fas fa-lock"></i>
            </div>

            <div class="input-group mb-2 sm:mb-4">
                <i class="fas fa-eye-slash show-pass toggle-password" data-target="confirmPassword"></i>
                <input type="password" placeholder="تأكيد كلمة المرور" id="confirmPassword" autocomplete="off" class="w-full autofill:shadow-[inset_0_0_0_1000px_#062C28] autofill:text-white autofill:[-webkit-text-fill-color:white]" required>
                <span id="confirmPassword-error" class="block w-full  text-[10px]  text-[#888] pt-1"></span>
                <i class="fas fa-lock"></i>
            </div>

            <button type="submit" class="submit-btn">انشاء حساب</button>
            <div class="extra-links pb-4">
                <span>هل لديك حساب؟</span>
                <a href="log.html" class="mr-2 ">سجل دخولك الآن</a>
            </div>
        </form>
    </div>


    <!-- javaScript -->
    <script>
     const toggleIcons = document.querySelectorAll('.toggle-password');
    
    toggleIcons.forEach(function(icon) {
        icon.addEventListener('click', function() {
            const targetId = this.getAttribute('data-target');
            const passwordInput = document.getElementById(targetId);
            
            if (passwordInput) { //منتاكد من أنو العنصر موجود لمنع الأخطاء
                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    this.classList.replace('fa-eye-slash', 'fa-eye');
                } else {
                    passwordInput.type = 'password';
                    this.classList.replace('fa-eye', 'fa-eye-slash');
                }
            }
        });
    });
    //  لاظهار الخطا بطريقة جميلة 
    function showToast(message, type = 'error') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `p-4 rounded-lg shadow-xl text-white transition-opacity duration-500 ${type === 'error' ? 'bg-red-600' : 'bg-green-600'}`;
    toast.textContent = message;
    container.appendChild(toast);
    
    setTimeout(() => {
        toast.style.opacity = '0';
        setTimeout(() => toast.remove(), 1000);
    }, 1000);
}
// اذا وصل الطلب بس رفضو السيرفر بيطلع الخطا 
        










        //1.منع تحديث الصفحة
       document.getElementById("signup").addEventListener("submit", async function(e) {
    e.preventDefault(); 

    // 1. جلب العناصر
    const nationalNumber = document.getElementById("nationalNumber").value;
    const email = document.getElementById("email").value;
    const phoneNumber = document.getElementById("phoneNumber").value;
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;
    const loader = document.getElementById("loader");

    // عناصر الخطأ
    const errors = {
        national: document.getElementById("nationalNumber-error"),
        email: document.getElementById("email-error"),
        phone: document.getElementById("phoneNumber-error"),
        pass: document.getElementById("password-error"),
        confirm: document.getElementById("confirmPassword-error")
    };

    // مسح الأخطاء السابقة
    Object.values(errors).forEach(el => el.textContent = "");

    // 2. منطق التحقق (Validation)
    let hasError = false;
    if (nationalNumber.length !== 11) {
        errors.national.textContent = "رقم الهوية يجب أن يكون 11 رقم";
        hasError = true;
    }
    if (phoneNumber.length !== 10 || !phoneNumber.startsWith('09') || isNaN(phoneNumber)) {
        errors.phone.textContent = "رقم الجوال يجب أن يكون 10 أرقام ويبدأ بـ 09";
        hasError = true;
    }
    if (password.length < 8) {
        errors.pass.textContent = "يجب أن تكون كلمة السر 8 خانات على الأقل";
        hasError = true;
    }
    if (password !== confirmPassword) {
        errors.confirm.textContent = "كلمتا المرور غير متطابقتين!";
        hasError = true;
    }

    if (hasError) return; 

    // 3. إظهار الـ Loader فقط بعد التأكد من سلامة البيانات
    loader.classList.remove("hidden");
    loader.classList.add("flex");

    // 4. إرسال الطلب
    try {
        const response = await fetch('http://egovservices.runasp.net/api/Auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nationalNumber, email, phoneNumber, password })
        });

        const data = await response.json();

        if (response.ok) {
            localStorage.setItem('tempemail', email);
            localStorage.setItem('tempNationalNumber', nationalNumber);
            window.location.href = "otp.html";
        } else {
            showToast(data.message || "حدث خطأ في التسجيل", "error");
        }
    } catch (error) {
        showToast("حدث خطأ في الاتصال بالسيرفر", "error");
    } finally {
      
        loader.classList.add("hidden");
        loader.classList.remove("flex");
    }
});
        

    </script>
</body>
</html>
