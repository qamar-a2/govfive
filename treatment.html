<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معاملاتي - بوابة الخدمات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
         @font-face {
            font-family: 'Qomra';
            src: url('./fonts/itfQomraArabic-Regular.woff2') format('woff2'),
                 url('./fonts/itfQomraArabic-Regular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        /* 2. تعريف الخط العريض */
        @font-face {
            font-family: 'Qomra';
            src: url('./fonts/itfQomraArabic-Bold.woff2') format('woff2'),
                 url('./fonts/itfQomraArabic-Bold.ttf') format('truetype');
            font-weight: bold;
            font-style: normal;
        }
        body { font-family: 'Qomra', sans-serif; background-color: #EFEBE3; }
    </style>
</head>
<body class="pb-10">
     
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold text-gray-800">قائمة معاملاتي</h1>
            <a href="choise.html" class="inline-flex items-center justify-center px-5 py-2 rounded-xl text-sm font-semibold transition-all duration-300 bg-[#1b3526] text-[#f2efe6] border border-[#28473a] hover:bg-[#96835F] hover:text-[#1b3526] shadow-sm tracking-wide">
              العودة للرئيسية
            </a>
        </div>
    </header>

    <div class="max-w-4xl mx-auto px-4 mt-6">
        <div class="flex bg-white/50 p-1 rounded-2xl gap-2 backdrop-blur-sm">
          
          <button id="btn-pending" onclick="filterAndRender('قيد الانتظار', this)" 
                  class="tab-btn flex-1 py-3 px-4 rounded-xl font-bold text-white bg-[#042522] transition-all duration-300">
                    قيد التنفيذ
          </button>
          
          <button id="btn-completed" onclick="filterAndRender('مكتمل', this)" 
                  class="tab-btn flex-1 py-3 px-4 rounded-xl font-medium text-gray-500 hover:text-gray-700 transition-all duration-300">
             المكتملة
          </button>
          
          <button id="btn-cancelled" onclick="filterAndRender('ملغى', this)" 
                  class="tab-btn flex-1 py-3 px-4 rounded-xl font-medium text-gray-500 hover:text-gray-700 transition-all duration-300">
             الملغاة
          </button>
      
        </div>
      </div>

        <main class="max-w-4xl mx-auto px-4 mt-8 space-y-4" id="requests-list">
        </main>

    <div class="md:hidden fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] bg-white/90 backdrop-blur-lg shadow-2xl rounded-3xl p-3 flex justify-around items-center border border-gray-100">
        <button class="p-3 text-gray-400"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg></button>
        <button class="bg-[#2D4A3E] text-white px-6 py-2 rounded-2xl flex items-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
            <span>معاملاتي</span>
        
        </button>
        <button class="p-3 text-gray-400"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg></button>
    </div>
    <a href="choise.html"></a>
</body>

<script>
    const token = localStorage.getItem("userToken");
    const BASE = "http://egovservices.runasp.net";
    
    let allRequests = []; 
  
    async function loadRequests() {
      try {
        const res = await fetch(BASE + "/api/requests/mine", {
          headers: { "Authorization": "Bearer " + token }
        });
        const result = await res.json();
        allRequests = result.data || result;
  
        // العرض الافتراضي عند تحميل الصفحة
        const initialBtn = document.getElementById("btn-pending");
        filterAndRender('قيد الانتظار', initialBtn);
  
      } catch (err) {
        console.error("حدث خطأ أثناء جلب البيانات:", err);
      }
    }
  
    function filterAndRender(status, clickedButton) {
      // 1. تحديث ستايل الأزرار ونقل اللون النشط
      if (clickedButton) {
        document.querySelectorAll('.tab-btn').forEach(btn => {
          btn.classList.remove('bg-[#042522]', 'text-white', 'font-bold');
          btn.classList.add('text-gray-500', 'font-medium');
        });
        
        clickedButton.classList.remove('text-gray-500', 'font-medium');
        clickedButton.classList.add('bg-[#042522]', 'text-white', 'font-bold');
      }
  
      // 2. فلترة وعرض البيانات
      const list = document.getElementById("requests-list");
      list.innerHTML = "";
  
      if (!Array.isArray(allRequests)) return;
  
      const filteredData = allRequests.filter(req => {
         const reqStatus = req.statusLabel || req.status || "";
         return reqStatus.includes(status); 
      });
  
      if (filteredData.length === 0) {
        list.innerHTML = `<div class="text-center p-12 text-gray-400 font-medium bg-white/30 rounded-3xl border border-dashed border-gray-200">لا توجد طلبات في هذا القسم حالياً</div>`;
        return;
      }
  
      filteredData.forEach(function(req) {
        list.innerHTML +=`
          <div class="bg-white rounded-3xl p-6 shadow-sm border border-gray-100 flex items-center justify-between group hover:shadow-md transition-all duration-300">
            <div class="flex items-center space-x-reverse space-x-5">
              <div class="bg-[#96835F]/10 p-4 rounded-2xl">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                </svg>
              </div>
              <div>
                <h3 class="font-bold text-lg text-gray-800">${req.serviceName || req.name || ""}</h3>
                <p class="text-sm text-gray-500 mt-1">${req.ministryName || ""}</p>
                <div class="flex items-center mt-3 text-xs text-gray-400">${req.submissionDate || ""}</div>
              </div>
            </div>
            <div class="flex flex-col items-end gap-3">
              <span class="bg-[#96835F]/20 text-[#8B7D54] px-4 py-1.5 rounded-full text-xs font-bold border border-[#96835F]/30">${req.statusLabel || req.status || ""}</span>
            </div>
          </div>
        ;`
      });
    }
  
    loadRequests();
  </script>

</html>
